e 模仿。你在做什麼？」", "「不，我是說——詩歌有什麼用？」", "一聲深長的嘆息。「我不知道啊，老兄，」她說著，拉起窗簾。天空佈滿高聳的藍色雲朵。「我不太買那套質問法。」", "「你不覺得這國家隨時就可能變成一個徹頭徹尾的法西斯死亡邪教，而我們把生活安排成互相寫詩給彼此——幾乎沒有人會看到——這件事一點也不擔心嗎？」", "她搖搖頭。「詩歌是我們彼此之間會做的事。花時間寫詩並不會讓你變壞——或者說變好，也不是那回事。」", "她身後的窗外，一大片雲朵中不同的區塊閃爍著暗藏的閃電。"]}, {"type": "section", "title": "夢，4/26", "paragraphs": ["我在一間董事會會議室主持會議。我的所有字詞都聚集在一張大會議桌旁。我正在發表演說。結束時，我說：「沒有你們我做不到這件事。」", "其中一個字詞把手臂縮進連帽衫裡，像個小孩一樣抱著膝蓋。"]}], "ch24": [{"type": "chapter", "title": "五月", "paragraphs": []}, {"type": "section", "title": "沒有任何東西", "paragraphs": ["一首名為「Nothing」的詩", "其中被描述了", "我可以問一下是哪位在打電話嗎？", "回到辦公室後，那位程式設計師又寄電子郵件給我。", "2019年5月10日 下午3:01", "嗨 D__，想再跟進那則《Children of Light》活動說明。演出者需要先核准文案才能上線。我們不想讓他等太久。", "謝謝", "我走向飲水機。拉比正在那裡，裝他的 Nalgene。忽然想到一個問題。", "「拉比——抱歉打擾一下，你有空嗎？」", "「你怎麼會打擾到我？」他說，扭著水瓶蓋，指關節泛白。", "「抱歉這麼突然問你這個問題。」", "「拜託。這是我的工作。問我任何事。」", "「你相信上帝嗎？」", "他沉默了一會兒。", "「那不是個愚蠢的問題。那是個深刻的問題。答案是否定的。」", "「信仰很有趣。上帝是真實的嗎？透過這個問題，人會走向信仰——因此信仰總是從懷疑開始。我不〈相信〉上帝。我對上帝是〈確定〉的。我經歷過他的力量。我知道誰是他的孩子——以及誰不是。」他豎起眉毛，陰謀似地笑了笑。走廊盡頭傳來影印機的嗡嗡聲。", "「謝謝，」我說。「這很有幫助。」", "他點點頭。", "我走回書桌，回覆了那位程式設計師的郵件。內容並不新穎。", "2019年5月10日，下午3:16", "我寧可不要。", "D__", "我在週末回家前沒有收到任何回覆。", "回家的路上，我在一站前下車，步行穿過普羅斯佩克特公園。當我走進大草地時，開始下起雨來。寒意襲來。驚愕的蚯蚓從土裡蠕動出來。", "露、土與雲下蚯蚓驚嘆。我一生都在對此感到驚奇。但現在我知道它們在驚嘆什麼。", "邪惡與美彼此相需。", "接下來的星期日，我在個人信箱收到人資的一封電子郵件，告訴我不要在星期一到辦公室——因為最近一次有關我工作表現與行為的事件正在調查中，我被置於為期三週的試用性休假。在試用性狀態下，我的薪資會被扣留，但我的保險保障暫時會維持。", "我在我的人脈裡查到一位牙醫，並預約了下週的看診。", "當牙齒衛生師幫我潔牙時，她責備我——很明顯我並沒有每天使用牙線。另外，自從我上次看診以來——幾年前——顯然我最後一顆智齒長出來了。並不像我父親擔心的那樣被感染，但還是必須拔除。牙醫當天下午可以安排我。他建議我找人來接我、帶我回家，並照顧我直到麻醉退去。", "想像一本小說，由數個對奧菲斯與尤麗狄刻神話的變奏構成——每一顆牙齒各一個版本。", "上排的每一顆牙齒代表尤麗狄刻在世時所寫的不同關於蛇的詩，直到有一條把她害死。下排的每一顆牙齒則代表奧菲斯在膽怯的三頭犬面前不得不唱的不同搖籃曲，直到刻耳柏洛斯終於閉上他六隻眼睛。", "上排的每一顆牙齒代表歐律狄刻曾經期待在回到人間後再度嘗試的不同性行為，直到奧菲斯那張又大又愚蠢的臉回過頭來。下排的每一顆牙齒代表歐律狄刻在冥府時曾熱愛的不同性行為，直到奧菲斯下到那裡差點毀掉一切。", "上排的每一顆牙齒代表奧菲斯曲目中不同的一首歌，當然不包括那些植物告訴他要唱的歌。下排的每一顆牙齒代表奧菲斯在歐律狄刻消失後隔天查看手機的某一刻。", "威爾和露西站在我上方，待客室裡燈光明亮、椅子滿滿。他們看起來很擔心。「我覺得他們沒做到，」我說，血從我嘴裡滴下來。「還有東西在那裡。」", "沒有詩歌居住在喉嚨裡——它只會穿過。氣管因此領取它的報酬——意義——而牙齒則嚐到冥界的滋味。「因為我們將滋味賦予每一個意義。」"]}, {"type": "section", "title": "午夜的寓言", "paragraphs": ["當我跟他們說我處於就業停滯時，父母採取策略性的沉默——他們知道什麼時候不該逼我。爸爸唯一問的是要不要在我附近見面喝杯咖啡。", "他開車來的那天，布魯克林正值繁花盛開，花樹撒下像音節般的花瓣，像一首你曾深深陶醉讀過一次、之後便永遠忘了每一行的詩，花瓣在我們周圍飄落。感覺冬天再也不會到來。", "「我一直很期待這一刻！」他坐下時說。「通常我人很冷靜的。」", "「切入重點吧，」我說。", "「真的值得嗎？」", "「我們不知道我會不會被開除，」我嘆道。「但說實話，如果我因拒絕幫一個戰犯洗白名聲而被炒，我也能接受。」", "「如果那真的發生，你有什麼打算？」", "「而在那份別的工作裡，」他一邊攪拌咖啡一邊說，「你覺得他們會不會不要你幫戰犯洗白名聲？」", "我盯著他看。", "「這是你的決定，我尊重，」他繼續說。「但在我看來——你現在的行為，就像什麼事都不會發生在你身上一樣。」", "我這麼想著。", "「你知道我父母是來自布魯克林這一帶嗎？」他忽然說。", "他突然開始講兩個家族傳說。", "第二個故事對我來說是新的。某年跨年夜，戰時，我外祖父母在布魯克林的家中為朋友們舉辦派對，就在我們喝咖啡的地方不遠。那時有食物和音樂，天非常冷。我父親的母親——被困、無聊——把頭伸出她的臥室窗外，想感受一點冰冷的空氣。兩個年輕男子走過樓下的街道。心血來潮，她大喊：「你們兩個想進來跳舞嗎？」其中一個人是我們家沒人記得的；另一個就是我的祖父。", "後來，當我獨自在公寓裡時，我反思這些故事。我理解——我想——第一個故事的重要性。但他為什麼要說第二個？", "我祖父讀給我聽時，會用手指拖過頁面，一個字母一個字母地。", "命運是一條線。它不會斷成詞——它會斷成片段。", "被盯著看的手機從不嗡嗡作響；被監視的寂靜從不嗡嗡作響；被拍死的蜜蜂嗡嗡叫直到不再嗡嗡；從未出現在開窗派對的客人不會替你按門鈴讓你進來；你死的時候沒聽見蒼蠅嗡嗡，因為你還活著；嗡嗡聲從來不是你想在想要的時候收到的簡訊。但鈴聲總會適時響起。", "我得到保全的允許，可以在等人資通知時順道回辦公桌拿幾樣私人物品。我從未在周末來過這裡。辦公室一片冷清。", "望著這片空蕩蕩的格子間蜂巢，陽光從窗戶灑進來，我搖了搖頭。如果一直都是這樣——安靜、空旷、光線充足——我的生產力可以翻倍。"]}, {"type": "section", "title": "Hell 2", "paragraphs": ["它在正確的地方", "一定是時機錯了", "它面對了現實", "它擁有千百張面孔", "身體在喊著走吧", "心在說不行", "它任由身體倒在地上", "為了愛它會做任何事", "它不會那樣做", "它把一把簸箕扇變成了槳", "它很快就往南沉去", "它的表面只隱約可見核心", "那是一齣關於無所謂的表演", "它被寫成了", "它被點亮了", "它相信我能飛", "它無法相信這不是真的", "對某人來說是天花板，對另一人來說卻是地板", "聽起來挺順耳的", "那是最美好的時光", "那是最美好的時光", "那是經過深思熟慮的計劃", "真正男人才會如此", "天亮晒太陽，露肌展力", "外面在下雪", "看樣子要下雪了", "感覺真有紐約味", "它牽引著我的手", "它在沙地上畫下了一條界線"]}]};

const ALL_PAGES = [
  { id:'cover',      type:'cover' },
  { id:'epigraph',   type:'epigraph' },
  { id:'authornote', type:'authornote' },

  ])
];

let currentIdx = 0;

// ── BUILD SIDEBAR ──
function buildNav() {
  const nav = document.getElementById('sb-nav');
  const frontDiv = document.createElement('div');
  frontDiv.style.cssText = 'border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:8px;margin-bottom:4px;';
  [['cover','封面'],['epigraph','題辭'],['authornote','作者的話']].forEach(([id,label]) => {
    const btn = document.createElement('button');
    btn.className = 'sb-front';
    btn.textContent = label;
    btn.id = 'nav-' + id;
    btn.onclick = () => goTo(ALL_PAGES.findIndex(p => p.id === id));
    frontDiv.appendChild(btn);
  });
  nav.appendChild(frontDiv);

  STRUCTURE.parts.forEach(part => {
    const label = document.createElement('span');
    label.className = 'sb-part-label';
    label.textContent = part.zh;
    nav.appendChild(label);

    part.chapters.forEach(chId => {
      const secs = CHAPTERS[chId] || [];
      const chSec = secs.find(s => s.type === 'chapter');
      const title = chSec ? chSec.title : chId;
      const btn = document.createElement('button');
      btn.className = 'sb-ch';
      btn.textContent = title;
      btn.id = 'nav-' + chId;
      btn.onclick = () => goTo(ALL_PAGES.findIndex(p => p.id === chId));
      nav.appendChild(btn);
    });
  });
}

// ── NAVIGATION ──
function goTo(idx) {
  if (idx < 0 || idx >= ALL_PAGES.length) return;
  currentIdx = idx;
  render(ALL_PAGES[idx]);
  updateActive();
  window.scrollTo(0,0);
  updateProgress(0);
  document.getElementById('sidebar').classList.remove('open');
}

function updateActive() {
  document.querySelectorAll('.sb-ch,.sb-front').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + ALL_PAGES[currentIdx].id);
  if (btn) btn.classList.add('active');
}

function updateProgress(scrollFrac) {
  const base = currentIdx / (ALL_PAGES.length - 1);
  const step = 1 / (ALL_PAGES.length - 1);
  const pct = Math.min((base + step * scrollFrac) * 100, 100);
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ── RENDER ──
function render(page) {
  const el = document.getElementById('content');
  el.className = 'page-enter';
  void el.offsetWidth;

  if (page.type === 'cover')      { renderCover(el); return; }
  if (page.type === 'epigraph')   { renderEpigraph(el); return; }
  if (page.type === 'authornote') { renderAuthorNote(el); return; }
  if (page.type === 'part')       { renderPart(el, page.part); return; }
  if (page.type === 'chapter')    { renderChapter(el, page.id); return; }
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function navButtons() {
  const prevDis = currentIdx === 0 ? 'disabled' : '';
  const nextDis = currentIdx === ALL_PAGES.length-1 ? 'disabled' : '';
  return `<div class="ch-nav-bottom">
    <button class="ch-nav-btn" ${prevDis} onclick="goTo(currentIdx-1)">← 上一頁</button>
    <button class="ch-nav-btn" ${nextDis} onclick="goTo(currentIdx+1)">下一頁 →</button>
  </div>`;
}

function renderCover(el) {
  el.innerHTML = `
    <div class="page-cover">
      <div class="cover-en-title">The Copywriter</div>
      <div class="cover-zh-title">文案撰寫人</div>
      <div class="cover-author">Daniel Poppick 著</div>
      <div class="cover-rule"></div>
      <div class="cover-ded">獻給 Andy 與 Laura</div>
      <button class="cover-start" onclick="goTo(1)">開始閱讀 →</button>
    </div>
    ${navButtons()}`;
}

function renderEpigraph(el) {
  el.innerHTML = `
    <div class="page-epigraph">
      ${EPIGRAPH.map(e => `
        <div class="epigraph-block">
          <div class="epigraph-text">${esc(e.text)}</div>
          <div class="epigraph-src">${esc(e.src)}</div>
        </div>`).join('')}
    </div>
    ${navButtons()}`;
}

function renderAuthorNote(el) {
  const secs = CHAPTERS['authornote'] || [];
  let body = '';
  secs.forEach(s => {
    s.paragraphs.forEach(p => {
      body += `<p class="para">${esc(p)}</p>`;
    });
  });
  el.innerHTML = `<div class="authornote-label">作者的話</div>${body}${navButtons()}`;
}

function renderPart(el, part) {
  el.innerHTML = `
    <div class="page-part">
      <div class="part-en">${esc(part.en)}</div>
      <div class="part-zh">${esc(part.zh)}</div>
    </div>
    ${navButtons()}`;
}

function renderChapter(el, chId) {
  const secs = CHAPTERS[chId] || [];
  const chSec = secs.find(s => s.type === 'chapter');
  const monthZh = chSec ? chSec.title : '';

  // find corresponding EN month from structure
  const enMonths = {
    '一月':'January','二月':'February','三月':'March','四月':'April',
    '五月':'May','六月':'June','七月':'July','八月':'August',
    '九月':'September','十月':'October','十一月':'November','十二月':'December'
  };
  const monthEn = enMonths[monthZh] || '';

  let body = `<div class="ch-header">
    <div class="ch-month-en">${esc(monthEn)}</div>
    <div class="ch-month-zh">${esc(monthZh)}</div>
  </div>`;

  secs.forEach(sec => {
    if (sec.type === 'chapter') {
      sec.paragraphs.forEach(p => {
        const frag = p.length < 72;
        body += `<p class="para${frag?' is-fragment':''}">${esc(p)}</p>`;
      });
    } else {
      const isDream = sec.title && (sec.title.startsWith('夢，') || sec.title.startsWith('Dream'));
      body += `<div class="section-block">
        <div class="sec-title${isDream?' is-dream':''}">${esc(sec.title || '')}</div>`;
      sec.paragraphs.forEach(p => {
        const frag = p.length < 72;
        body += `<p class="para${frag?' is-fragment':''}">${esc(p)}</p>`;
      });
      body += `</div>`;
    }
  });

  el.innerHTML = body + navButtons();
}

// ── SCROLL ──
window.addEventListener('scroll', () => {
  const scrolled = document.documentElement.scrollTop;
  const total = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  updateProgress(total > 0 ? scrolled/total : 0);
});

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentIdx+1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(currentIdx-1);
});

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── INIT ──
buildNav();
goTo(0);
</script>
</body>
</html>
