<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Copywriter by Daniel Poppick</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap');

:root {
  --ink: #1c1916;
  --paper: #f4efe4;
  --paper-warm: #ede6d4;
  --accent: #7a5c38;
  --accent-light: #b8916a;
  --muted: #8a7e72;
  --rule: #cfc4b0;
  --sidebar-w: 248px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'EB Garamond', 'Noto Serif TC', 'Source Han Serif TC', Georgia, serif;
  font-size: 19px;
  line-height: 1.9;
  display: flex;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--ink);
  height: 100vh;
  position: fixed;
  top:0; left:0;
  overflow-y: auto;
  z-index: 100;
  display: flex;
  flex-direction: column;
}
#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

.sb-header {
  padding: 30px 22px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sb-en-title {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 14px;
  color: rgba(244,239,228,0.35);
  margin-bottom: 5px;
  letter-spacing: 0.02em;
}
.sb-title {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 17px;
  color: var(--accent-light);
  line-height: 1.35;
  margin-bottom: 7px;
}
.sb-author {
  font-size: 9.5px;
  letter-spacing: 0.18em;
  color: rgba(244,239,228,0.32);
  font-family: sans-serif;
  text-transform: uppercase;
}

.sb-nav { padding: 8px 0 50px; }

.sb-part-label {
  font-size: 8px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  padding: 14px 22px 4px;
  font-family: sans-serif;
  font-weight: 500;
  display: block;
}

.sb-ch {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  color: rgba(244,239,228,0.45);
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  padding: 4px 22px;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.5;
}
.sb-ch:hover { color: rgba(244,239,228,0.85); background: rgba(255,255,255,0.03); }
.sb-ch.active {
  color: var(--paper);
  background: rgba(122,92,56,0.2);
  border-left: 2px solid var(--accent);
  padding-left: 20px;
}

.sb-front {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  color: rgba(244,239,228,0.28);
  font-family: sans-serif;
  font-size: 8.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 6px 22px;
  cursor: pointer;
  transition: all 0.15s;
}
.sb-front:hover { color: rgba(244,239,228,0.65); }
.sb-front.active { color: var(--accent-light); }

/* ── MAIN ── */
#main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
}
#content {
  max-width: 700px;
  margin: 0 auto;
  padding: 72px 56px 140px;
}

/* ── PAGE TRANSITIONS ── */
.page-enter {
  animation: fadein 0.3s ease;
}
@keyframes fadein {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: none; }
}

/* ── COVER ── */
.page-cover {
  min-height: 78vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 0;
}
.cover-en-title {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(36px, 5.5vw, 58px);
  font-weight: 400;
  line-height: 1.1;
  color: var(--ink);
  margin-bottom: 10px;
}
.cover-zh-title {
  font-family: 'EB Garamond', serif;
  font-size: clamp(18px, 2.5vw, 26px);
  color: var(--muted);
  margin-bottom: 30px;
  font-style: italic;
}
.cover-author {
  font-family: sans-serif;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
}
.cover-rule { width: 44px; height: 1px; background: var(--rule); margin: 44px 0; }
.cover-ded {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 4px;
}
.cover-start {
  margin-top: 56px;
  background: none;
  border: 1px solid var(--rule);
  color: var(--accent);
  font-family: sans-serif;
  font-size: 8.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 11px 22px;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-block;
}
.cover-start:hover { background: var(--accent); color: var(--paper); border-color: var(--accent); }

/* ── EPIGRAPH ── */
.page-epigraph {
  min-height: 52vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 0;
}
.epigraph-block { margin-bottom: 44px; }
.epigraph-text {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 20px;
  line-height: 1.65;
  color: var(--ink);
  margin-bottom: 8px;
}
.epigraph-src {
  font-family: sans-serif;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--muted);
}

/* ── AUTHOR NOTE ── */
.authornote-label {
  font-family: sans-serif;
  font-size: 8.5px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 44px;
}

/* ── PART TITLE ── */
.page-part {
  min-height: 50vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 0;
}
.part-en {
  font-family: sans-serif;
  font-size: 8.5px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 18px;
}
.part-zh {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(28px, 4.5vw, 46px);
  line-height: 1.2;
  color: var(--ink);
}

/* ── CHAPTER ── */
.ch-header {
  margin-bottom: 52px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--rule);
}
.ch-month-en {
  font-family: sans-serif;
  font-size: 8.5px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.ch-month-zh {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 32px;
  color: var(--ink);
  line-height: 1.2;
}

/* ── SECTIONS ── */
.section-block {
  margin-bottom: 52px;
}
.sec-title {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 17px;
  color: var(--accent);
  margin-bottom: 20px;
  padding-top: 36px;
  border-top: 1px solid var(--rule);
  line-height: 1.4;
}
.sec-title.is-dream {
  color: var(--muted);
  font-size: 12.5px;
  letter-spacing: 0.07em;
  font-style: normal;
  border-top-style: dashed;
  font-family: sans-serif;
}

/* ── PARAGRAPHS ── */
.para {
  margin-bottom: 1.5em;
  color: var(--ink);
}
.para.is-fragment {
  font-style: italic;
  color: var(--muted);
}

/* ── BOTTOM NAV ── */
.ch-nav-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 80px;
  padding-top: 28px;
  border-top: 1px solid var(--rule);
}
.ch-nav-btn {
  background: none;
  border: 1px solid var(--rule);
  color: var(--muted);
  font-family: sans-serif;
  font-size: 8.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 9px 18px;
  cursor: pointer;
  transition: all 0.16s;
}
.ch-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.ch-nav-btn:disabled { opacity: 0.22; cursor: default; pointer-events: none; }

/* ── PROGRESS ── */
#progress {
  position: fixed;
  top:0; left: var(--sidebar-w); right:0;
  height: 2px;
  background: rgba(207,196,176,0.3);
  z-index: 200;
}
#progress-bar {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.35s ease;
}

/* ── MOBILE ── */
#menu-toggle {
  display: none;
  position: fixed;
  top:14px; left:14px;
  z-index: 300;
  background: var(--ink);
  border: none;
  color: var(--paper);
  width: 36px; height: 36px;
  cursor: pointer;
  font-size: 15px;
  border-radius: 2px;
  align-items: center;
  justify-content: center;
}

@media (max-width: 720px) {
  :root { --sidebar-w: 0px; }
  #sidebar { width: 82vw; transform: translateX(-100%); transition: transform 0.26s ease; }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  #content { padding: 52px 26px 100px; }
  #menu-toggle { display: flex; }
  #progress { left: 0; }
}
</style>
</head>
<body>

<button id="menu-toggle" onclick="toggleSidebar()">☰</button>
<div id="progress"><div id="progress-bar"></div></div>

<nav id="sidebar">
  <div class="sb-header">
    <div class="sb-en-title">The Copywriter</div>
    <div class="sb-title">文案撰寫人</div>
    <div class="sb-author">Daniel Poppick</div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
</nav>

<div id="main">
  <div id="content"></div>
</div>

<script>
const CHAPTERS = {"authornote": [{"type": "part", "title": "作者的話", "paragraphs": ["我相信缺席之物的真實存在。若某物不在此處，它必定在別處。", "宿命：缺席之物如何保持遺失。", "機緣：缺席之物如何回歸。", "小說：我們如何憑空捏造它。", "詩歌：我們如何等待它。", "每個人都想成為詩人，以便在某個代碼上出現幽靈：無論是金錢、愛、致命的帝國、恩典政治或眨眼的未來性，詩歌令人興奮，因為它把你從你曾以為的自己帶走，帶入主導 x 的核心。", "重要的不是我們「已經」沒有該死的在乎可給予：我們本身就是那個在乎的虛無。而在這個在乎虛無的事件視界內，有一個區域，所有事物在那裡緩緩滲透——光、聲、物質，以及時間本身。一顆崩潰的恆星。", "觀察、渴望、寓言、格言、夢境、故事、新聞、笑話、偷聽或杜撰的片段話語、疑問、清單、歌詞、打油詩、口述、電子郵件、廢話、風向標、謊言。筆記。", "以下為虛構作品。但若它沒有引發任何事，那就稱它為詩。"]}], "part01": [{"type": "part", "title": "夏日筆記本，2017", "paragraphs": []}], "part02": [{"type": "part", "title": "秋季筆記本，2017", "paragraphs": []}], "part03": [{"type": "part", "title": "冬季筆記，2017/18", "paragraphs": []}], "part04": [{"type": "part", "title": "春季筆記本，2018", "paragraphs": []}], "part05": [{"type": "part", "title": "夏季筆記本，2018", "paragraphs": []}], "part06": [{"type": "part", "title": "秋季筆記本，2018", "paragraphs": []}], "part07": [{"type": "part", "title": "冬季筆記本，2018/19", "paragraphs": []}], "part08": [{"type": "part", "title": "春季筆記本，2019", "paragraphs": []}], "ch01": [{"type": "chapter", "title": "六月", "paragraphs": ["風在沙上抹去了一道線。"]}, {"type": "section", "title": "新任執行長的寓言", "paragraphs": ["「我們所做的一切都要有溫度，」他在會議快結束時說。「當有人寫了篇負評，抱怨他們那塊薰衣草香味的瑜伽墊，我們要問自己，能如何加強和那個人的連結。當我們打包寄出顧客訂的『Yas Queen』抱枕，我們要以他們自我肯定的方式去肯定他們。當我們在寫關於茄子表情符號無人機的描述時，我們要預想那個產品會如何讓顧客感受——把內建在機頭的藍牙喇叭強調出來，會不會讓人在網站上讀到那段時更深刻地連結到當下的喜悅？我不知道，D__，你是文案——你告訴我。從現在開始，我們做的一切都要有溫度。」", "我被迷住了，點頭同意——奇怪的是，這不只是因為我靠這份工作吃飯。", "這時我其實應該對這個問題有答案了，但我沒有。我給了他我的固定答法：「大多數都不押韻。」但接著我想起來，仔細想想，我最近的作品裡確實有很多內部押韻，於是又笨拙地補了一句：「但最近很多是有的。」", "他繼續說得好像我沒說話——好像我剛說的話是在時間之外說出的。「我明天會請大家帶一個對他們有意義的物品來。真的對你有意義的〈i〉—真的〈/i〉—你懂嗎？」（眯起眼睛，彷彿要在語氣裡打斜體）", "我不懂。「是，當然。」", "「很好。明天帶來，我們再談。」", "當我回到辦公桌時，我在 Google 搜尋：", "什麼是產品", "我並不以自己是個精明的職場老手自豪，但在十年參加詩歌朗讀會的經驗中，我學到了一兩件事：那些渴望權力的虛無主義者，無論出於何種理由，都需要自我說服他們是溫和的。顯然這次會議會有人被開除，事實上這場會議就是一場考驗，而我決定那個人不會是我。", "隔天的會議上，同事們拿出耳環、一件有魅力地褪色的牛仔外套、相框、一個髮夾——執行長對那個髮夾尤其印象深刻——一本筆記本，以及一台合成器鍵盤。輪到我了。我拿出多年的個人藏書《The Gift》這本書，說明我珍視它勝過其他財物，因為它教我在網路購物時看見原先看不見的人際關聯網，而支撐這些關係的物質——無論在人類商業、植物與真菌之間，甚或岩石之間——是時間本身，是可想而知最珍貴的商品。我還提到我也很喜歡封面上那種復古字體。", "幾乎所有嘗試出版自己作品的人，常常以屈辱且痛苦的方式學到：對大多數人來說，書是為了給讀者一小部分體驗而設計的商品。這是一種殘酷且受限的想像文學（以及其他很多事物）的方式——但即便在這種可能扼殺靈魂的視野之下，一整個生態系統仍然頑強地存續了好幾個世紀。然而在我們的執行長眼裡，一本不流行、破舊、即便只是對資本主義提出最溫和批評的書也不可能被視為商品，因為他無法想像有誰會把這本書當作髮夾來用。那是我的優勢。", "會議結束後，我跟著他進了辦公室。「我可以跟你談一談嗎？」我說。", "「當然可以，D__。」他緊笑著。", "「我在想你剛才說的，關於我們所做的一切都需要有心。我要把這個給你。」我把書滑到他的桌上。「我唯一的要求是你看完之後把它傳下去，我覺得這跟這本書的精神以及你想要帶給這間公司的東西相符。這跟我們剛剛談的很有關聯。我想你會很喜歡。」", "他重新看著我。", "這不是一個關於宿命的故事。這是一個關於機緣巧合的故事。", "「非常謝謝你，」他說。「我會的。記下了。」", "我與他對視，他像沙丘等待風一樣，等著我開口。", "我不是個虔誠的人，但有時會發現自己處在一種看似由別處構思出的情境——在平行維度中，被具有敘事全知的智慧所創造。John Ashbery 寫道：「萬物皆有其時程，只要你能找出是什麼。」在這些看似被捏造的時刻，感覺彷彿有某種存在在試圖教我一個時程，假如我願意學習。而我確實想學，但我從未弄清那是什麼——事實上我幾乎從未覺得自己在任何情況下學到什麼。但當一個好故事掉到我眼前時，我是能分辨出來的。", "但不僅僅是故事。我會無意中聽到別人說了些話，似乎暗示著一整個現實從我所知的現實中分裂出去——就像前幾天我經過布魯克林市中心法院的台階要去地鐵時，一個臉紅的男子穿著熨得平整的西裝對著電話喃喃說：「有各種公民權利的程度，超出我的預期。」", "有時候那並非是無意間聽到的語言，而是像透過無線電訊號傳來的話語。當我記起一個夢時，經常只是片段化的短語，由一個鮮明但無法辨認的聲音所說，例如「你有多麼悅耳的皮膚！」彷彿是一位中西部的銀行家說的。而且不只是在夢裡。有時根本不是語言，而是一個念頭，例如字母表在陽光下竟能實際投下陰影的這個念頭；或是一個聲響、一段音樂、某個特定的鐘聲。", "我覺得若我順著這些瞬間的邏輯再深入一些，我會發現一個偉大謎題的答案，但若我追得太遠，就永遠找不回回到自己生活的路。", "我們公司赤字累累，「in the red」這個詞我一直很喜歡。換個說法可能是我們公司「賺不到足夠的錢」，甚至可以說是在「大把流失資金」，或者「沒能創造出足以讓顧客拿出辛苦賺來的流通資產去換取所有權的、有價值或有『靈魂』的商品，因為我們販售的那些俗艷地位商品只是過季的俗艷地位商品，也就是垃圾；而且這些顧客的流通資產對公司繼續生存至關重要，所以公司，我們公司，正搖搖欲墜，瀕臨毀滅。」", "一陣風從執行長敞開的窗戶吹進來，把幾張散紙吹得到處都是。執行長慌了，彷彿一生第一次失了方寸，又朝我笑了一下，匆忙去撿那些紙。我趁機離開了。", "我把昨晚的剩菜放進微波爐加熱，愉快地回到辦公桌吃飯。我咬下一口，這只能被形容為肉餅界的凡爾賽。", "整個月大家都普遍預期會有人被裁員。但隔一天新任執行長沒出現。再隔一天也沒。又隔一天。 他像雨後太陽下的積水一樣從辦公室消失了。我們都在等的那個字從未出現。", "我以現實主義者的姿態，帶著筆電和一小杯用 Keurig 沖的咖啡，攤在蕨類植物旁那張灰色的長躺椅上，試圖想像那些想買熊貓造型衣帽鉤的人，想要對自己相信什麼。", "「我喜歡你上週會議帶來的那件牛仔外套，」我下週在辦公室廚房對同事法蒂瑪說。", "「喔，謝謝，」她說。她回到自己的座位，鞋子在塑膠地板上啪嗒作響。", "之後，一切彷彿我們曾共同參與的那場儀式從未發生過。這就是為什麼我需要把事情寫下來。"]}], "ch02": [{"type": "chapter", "title": "七月", "paragraphs": ["當鬧鐘響起時我已經醒了——我們的兩隻貓在凌晨四點把我吵醒，拍打著窗簾，對著空氣哀鳴。我想知道長期睡眠不足會如何影響我的性格，但日常生活中我已經習慣了。露西半睡半醒地轉向我說：「我夢到詹姆斯·甘多菲尼在天上手淫。」", "我把她臉上的頭髮撥開。「你在焦慮什麼嗎？」", "她嘆了口氣。「就是工作。」", "我伸手拿起床頭櫃上的筆記本，潦草寫下：「我夢到 T.索普拉諾在天上自慰。」", "露西懷疑地看著我。「你在日記裡寫我的夢嗎？」", "「那不是日記。」", "「你在你的夢境日誌裡寫我的詹姆斯·甘多菲尼夢？」", "「這不是日記，是筆記本。而且如果你不打算用，那我可以用嗎？」", "她搖搖頭。「你應該試著記錄自己的夢，但好吧。」", "「如果我夢到詹姆斯·甘多芬尼在天上手淫，我也會把它寫下來。你有這種天賦卻連詩都不用？」", "「是真的，我不會把那個用在詩裡。」", "一本筆記本是為一個人的表演：寫它的那個人。但在成為自己的觀眾時，我總會變成別人。即便我以細緻入微的方式描述現實，空氣中總會帶著一絲胡扯。為一個想像中的公眾而寫的私人文字。浪費時間。"]}, {"type": "section", "title": "故事的寓言", "paragraphs": ["我認識的大多數工作外的人都是詩人。我和露西已同居六年。我們在研究所念書時因為詩結下了緣，那時我在念創作碩士（MFA），她在攻讀博士，寫一篇關於後伊莉莎白時期戲劇中使用活體動物的論文——多半是綿羊，但偶爾也有狗和豬——後來她放棄了學位，去雜誌社工作。威爾不久前剛完成他的博士論文，題為官僚主義與繪景詩學（ekphrasis）的詩論，他的指導老師說那是她讀過最好的論文，威爾卻在一家辦公家具供應公司的送貨員上班，因為學術界沒有職缺——他也是詩人。露絲直到最近還靠一項有聲望的寫作獎學金津貼生活，她這個月要搬去洛杉磯，也要去讀博士——也是詩人。我們在我和露西家為她舉行送別晚餐。", "「我受夠了，」露絲一邊吃著四分之一路烤花椰菜，一邊把話說得像個靈活的拳擊手優雅地揮著沙包。我們的一隻貓，身上有靶心斑紋的那隻，跳上了桌子，我下意識一個動作把牠抱起丟到沙發上，牠著地時發出輕輕的一聲喵。露西伸手去拿露絲的盤子。「喔，我的意思是我對詩歌受夠了，」露絲說。「但你可以把盤子拿去。謝謝，好好吃。」", "「你覺得那——是什麼意思？就是你不寫詩了嗎，」威爾帶著有點急躁的耐心說著，點上一根大麻煙。他和露絲幾年前交往過，之後放下了，還是朋友。他深深吸了一口，然後遞給她。", "「不用了，」她說，還是先吸了一口再把煙傳給我。「我當然不是不再需要詩。但我確實覺得我——我們在詩裡的學徒階段要結束了。我不再對碎裂的句法感興趣，甚至不再對語言的物質性感興趣。」", "「像你那首揭示出『U BE』藏在單字『PUBE』裡的詩？」威爾說。「我確實比較喜歡你後來的作品。」", "「那不是我的！」", "「我喜歡那首詩，」露西說，回到桌邊。", "「有那麼一點味道，」我說，「但那是切斯特寫的詩。」", "「你有一陣子就是喜歡那種東西，」威爾說。", "「我二十多歲也有過一陣子迷阿拉姆·薩羅揚（Aram Saroyan），就像其他人一樣。天哪，切斯特（Chester）真糟糕。他還有魅力嗎？我到洛杉磯時應該傳訊息給他。總之，我比較喜歡來自某人真實生活的詩。敘事！我們為什麼要把坦白詩人（confessionalists）打入冷宮？」露絲一邊抓著我們另一隻貓──俄羅斯藍的頭，那貓一邊呼嚕叫。", "「因為他們都無聊、種族主義，又自殺了？」威爾說。", "「我愛安·塞克斯頓（Anne Sexton），」露西說。", "「洛威爾（Lowell）讓人作嘔，」威爾說。「除了他翻譯那首包含 'fuck' 這個字的波德萊爾（Baudelaire）詩。那是個好選擇。」我們都點頭。", "「看，聲音是從語法中出現的，」露絲說。「語法來自於人物，人物來自於特定的時空。一個故事就是靠那組元素串起來的。」她的眼睛忽然往後翻，好像要被感召一樣。「各位！跟你們說話的感覺就和寫作一模一樣——就像我只是在跟我的電腦講話。」", "「我要偷走這句，」我說。", "「不客氣。」", "「我現在的大部分詩都是清單，」我說，為了惹她。「清單能成為故事嗎？」", "「清單就是盤點，而在每一份盤點背後——」", "「當蕾哈娜唱『work, work, work, work, work, work，』」露西打斷說，「那就是個相當了不起的故事。」", "「是啊，尤其接著德瑞克唱『you need to get done, done, done.』」露絲笑著說。", "我很難過露絲要離開了。一個時代的結束。我們四個已經為自己組成了一個小家庭。我們彼此陪伴度過某種危機。但那是為了什麼？信仰？", "什麼？", "夜晚，像隻貓，受著空洞臉龐的折磨。", "你來這裡幹什麼，貓，如果不是讓我們把Love Streams投射到你身上？我不是詩意地說：我是說我想把約翰·卡薩維茲的最後一部電影投射到你那巨大的軀體上，當你拍打著光時。或許那時你終於會知道有些人所經歷的。"]}, {"type": "section", "title": "答案為「夜」的問題", "paragraphs": ["用什麼工具才能最清楚地看見那個工具？", "何時才是合適的時間？", "哪一位守望者？", "比地獄的概念更巨大的，只有它的外形。它的火焰在外環抓住你的臉，你的臉成為地獄的衛星。否則你的臉只是你的臉。", "有人說根本沒有繆斯這種東西。我傾向於相信繆斯確實存在，儘管我們遇到它時可能不太喜歡。舉例來說，威爾新譯的〈伊利亞特〉開頭：", "好了 Google，什麼是憤怒？", "我清楚記得八十年代末的一部兒童電影，講述一隻鵝與一頭驢成為朋友，片名為〈Dido & Anus〉。儘管這部電影其實不存在，它仍然給我留下了深刻印象。", "這些動物有什麼共同點？（a）天生擅長模仿人類語言。（b）對所有與「負重」有關的工作抱持矛盾的態度。（c）對鄰谷某座農場懷有一種懷舊之情——那裡曾經在很久以前一起在藍鐘花中打滾——這種懷舊只有最敏感的孩子能正確解讀，他會高興地在週六晚上坐在電視前塞滿奧利奧餅乾，保母則在沙發上打盹，這被視為撒旦本人含蓄的邀請，要口述地記錄世界，作為記憶的幫助。", "「我可以把你列為我洛杉磯租屋申請表上的推薦人嗎？」露絲問。「我會把你寫成我的朋友——也是同事——因為那是真的！他們只需要你的名字和電話。」我驚覺她是對的。詩歌已經讓我們成為同事。", "同事是官僚表格中的陽光；朋友是雨；他們的名字和電話是撒在平坦、漂白土壤中，長出蒼白幼芽的種子。", "在場見證它發生：你的朋友、事件、以及原子。", "走進辦公室，我感覺四肢有撥號音般的律動。慾望的嗡嗡聲，被期待鍍上了金邊。", "法蒂瑪抬頭停下打字，彷彿被陽光下一片蕨類和飲水機旁散發光芒的粉紅色泡棉方塊催眠了。", "「怎麼了？」我過了一會兒問。", "「我剛在想我想要搬進公寓的一張很酷的灰色沙發，」她眨了眨眼繼續打字，「還有如果最後我變得無家可歸會是怎麼一回事。」", "一個為花設計的自動校正：顯然沒用。但如果是為了買那些花所用的錢設計的自動校正呢？為了在第一片花瓣飄落之前的那段時間呢？", "我是「在我的青春期」還是它的殘酷劇場？", "「我在三年級就達到作家巔峰了，」我開車送露絲去機場時她說。「那些詩很棒。都是關於真實的事物。雪貂。移民。懷俄明的偷獵者。工業革命、1912 年的『麵包與玫瑰』罷工、德州的現況。你看過我媽編的選集。」", "「你焦慮是因為你覺得讀博士會把你和你自己的詩隔開，」我以單調的自動駕駛聲診斷，眯眼看著車流，「但它只會餵養—他媽的！」我試著換車道時一輛車突然切入。", "我們沉默地繼續坐著。一到肯尼迪機場的路邊，我說：「什麼事情會把你和詩徹底隔絕？」", "她突然看起來要哭了，但只是一個聳肩和微笑。「謝謝你載我一程。照顧好威爾和露西。」", "她抓起行李，把它們拖進機場。"]}, {"type": "section", "title": "他愛字母表。", "paragraphs": ["但他更愛字母表的陰影。", "他把日曆、詩作和筆記整理得像一瓶修剪過的花。"]}], "ch03": [{"type": "chapter", "title": "八月", "paragraphs": ["在我周遭的大人們似乎都毫不在乎上帝，不論是猶太教的還是其他，但他們思考背後有一種神祕的動機，我想弄清楚。為什麼他們會告訴我們長大後可以成為任何想成為的人，然而他們自己卻有明顯討厭的工作？為什麼當另一個人在餐廳掏出信用卡時，其中一個人就堅持要付晚餐？為什麼他們覺得我應該想讀《The Lord of the Rings》，那書既無聊又反猶，而我不該想看《The Simpsons》，那節目既有趣又教我社會的事？為什麼他們說每個人都應該被平等對待，但談到沒錢的人和巴勒斯坦人時卻說這「很複雜」？", "每個星期六我們烤著個人大小的麵包，然後把奶油乳酪塗在洞周圍。在各方面，那洞就是我們所崇拜的。我的問題對拉比來說是合理的。他的回答也合理。", "一年裡我幾次會在曼哈頓與父母碰面吃晚飯、去博物館或看一齣有品味的外百老匯戲碼——我們不看音樂劇。今晚，戲快結束時，我注意到他們在我旁邊睡著了，頭轉向舞台上演員此刻互相尖叫的那一側。當尖叫的演員走過舞台、退入側台、幕落下時，我父母睡著的頭也隨著他們而轉。燈亮了。觀眾鼓掌。父母睜開眼睛。", "「文化，」我爸眨著眼說。我等他把話說完。他拍了拍我的膝蓋，捏了捏。", "「太實驗性了，」我媽說。「劇情根本講不通。」", "一陣顫慄掠過我——那感覺不完全是憤怒，但跟憤怒平行。然後，從我螢幕的另一端，我收到一封電子郵件通知，請我替一個印有NAMASTE IN BED字樣的 LED 燈箱撰寫產品描述。", "辦公室境象描寫：那個為設計師抱枕所寫的產品描述裡的拼字錯誤，聲稱能提供「an object lesion in luxury」，或許很美。但那不是藝術。", "辦公室境象描寫：沙發旁那株蕨的直白語言。它的拼字錯誤散落滿地。", "辦公室境象描寫：一座同時只是椅子的椅子雕塑。一把成了藝術拼字錯誤的椅子。", "當你坐在裡面時，你就被描述了。", "執行長每週回辦公室一兩次，但即便他在那裡我們也幾乎看不見他。當我們見到他時，他點點頭、用一種小小的、羞憤的聲音打招呼；那不太像聲音，更像是他嘴周圍空氣上的一個凹痕，像廢車場裡一堆生鏽的輪子，像幾朵幽靈般的蒲公英掠過。", "我的任務是為一套為成年人設計的沙堡建造套裝撰寫產品描述，套裝包含幾個色調雅致的水桶和符合人體工學的塑膠挖具。圖片顯示一場海灘派對，幾位與我年齡相仿、腹肌線條分明的模特兒跪在修整過的圓柱形沙牆旁。其中一位模特兒眨著眼，手裡拿著一個標有MOMMY JUICE的小盒子，插著吸管。我這一代的成年人——被大學畢業後等候我們的災難性經濟所創傷——正處於終身自我嬰兒化的過程中。我們中很多人都害怕自己生小孩。", "我想到一串愚蠢到幾乎無法打字的詞。但我從經驗知道，這種感覺意味著我碰到了一個值得保留的點子。我給我的創意總監發了封電子郵件：", "覺得蒼白無力？試試這個：你需要陽光，還有一座可以稱作自己的城堡…", "幾分鐘內，它就會出現在網站上，那裡的讀者比我的詩永遠也多不只一個。"]}, {"type": "section", "title": "閱讀的寓言", "paragraphs": ["「這是我的兒子，Pail。」", "「喔，哈囉！你看起來曬得蠻嚴重的。你有去海邊嗎？」", "「是的，事實上他有去海邊。但我沒說『蒼白』。我說的是『水桶』。」", "「哦，抱歉—你的意思是指那種小水桶嗎？」", "「是的，就像那種可以裝螃蟹的小水桶。」", "「我現在懂了。」", "「沒有，很抱歉之前沒理解。並不是說我——不。我不會說我討厭你兒子。我不會。只是——聽我把話說完——理解他的名字很像閱讀。而如果問題是關於閱讀，而不是你兒子，那答案是肯定的，我確實很厭惡閱讀。非常厭惡。」", "「嗯，這一點我再同意不過。或許你可以把他的名字想成一個小物件。一個有用的物件。『桶』。像『帆』，像船上的帆——而且不是指商品或貨幣的交換。」", "「很抱歉，但那個名字不是一個有用的物件。」", "MY OTHER PORSCHE IS A FORESKIN這張貼紙是我從一群在百老匯與運河街發放傳單、看起來非常有組織且專業的反割禮團體那裡收到的。", "但我要把這張貼紙貼在哪裡？"]}, {"type": "section", "title": "日蝕的寓言", "paragraphs": ["翠貝卡擠滿了為了看日蝕而提早離職的人。那週早些時候很難買到有色護目鏡——每家店都賣光了——但最後大家互相借用。有人遞給我一副，我又轉給別人。我的同事們一個接一個從大樓走出來，加入指向天空的人群，還有在八月毒辣高溫下因日偏蝕投射的弦月形影子而枯萎的市政花圃。我們的執行長是唯一沒跟我們一起去看這場至高的天文現象的人，連那個想看得要命、被稱為法西斯的總統也被拍到試圖直視太陽。"]}, {"type": "section", "title": "商務便服的寓言", "paragraphs": ["那員工穿著破爛，朝遠方一座閃閃發光的金字塔眯起眼睛。斯芬克斯坐在他上方，盲目地用爪子翻找著丟失的手機。從金字塔傳來微弱的鈴聲。斯芬克斯轉向那員工，然後望向鈴聲的方向。", "「我連這個都沒衣服可穿，」那名員工嘆道，陽光炙烤著他，沙地在前方一望無際。", "沒有藝術，沒有旋律，沒有不被某種暗沉勞役束縛的時光。"]}], "ch04": [{"type": "chapter", "title": "九月", "paragraphs": ["所有愉快的通勤都相似；每一趟不愉快的通勤各有各的不快。而無論如何，所有辦公室都是白晝與紙張的墳墓。", "火車把他吸進他的韻律，他的墳墓。", "我們每天都會收到他帳號發來的電子郵件，用一種更多遮蔽少量揭示的措辭描述公司的財務——是一種不同性質的揭示。我們顯然被期待做好本分，但同時也要理解未言明的事：結局近了。", "我看得出這個時刻在我職業生涯中的動態，這不代表我不討厭它。理解那些未說出口的話、解碼沉默、超越理性去觸及 Keats 所謂的「負能力」。這不是詩，但詩訓練了我去做這些事。", "詩：在勞動中表現出轉身離去的藝術。", "所以我們繼續工作。像雷雲被雨水侵蝕般優雅地工作並腐朽，那雨水滴落在我們的頭顱上，我們試圖保護我們那黑色、個人化、平板液晶螢幕般的外骨骼殼不被毀滅性的濕氣侵襲。", "新聞過去會被送到家門口，印在薄薄的紙上。如今它只是直接穿透臉孔，被印在我們的大腦裡，在那裡腐爛。", "我在禮拜天晚些時候看手機，看到那則並非新聞的消息。約翰·阿什伯里去世，享年九十歲。", "詩人們性情乖戾。即使在我的朋友之中，談到詩本身時，我們也常常爭論不休，幾乎沒有共識。但在阿什伯里的詩裡，我們的分歧帶著一種調皮的共謀感。他的許多詩句已深植於我們共有的邏輯感中，像被防腐處理般滲入我們的笑話──「她男朋友的腦袋是一袋綠色的水仙莖」，每當我忘了倒垃圾就會對露西這麼說──所以那感覺彷彿只有一半是出自他的筆。向他告別，某種程度上也就是向彼此告別。", "我試著哭，卻哭不出來。我潑了點冷水在臉上，然後到廚房去做晚餐。萬事都有它的時間表，只要你能找出來。", "只要有機會，我就會把一些零碎的自由工作稿轉給威爾。報酬不多，但輕鬆賺錢。阿什伯里去世的那個週二，我收到他寄來的一組產品描述。", "• 空間往四個方向延伸：上、下，以及左右。這正是這個白色仿大理石書櫃如此實用的原因。當你把物品擺放在上面──不僅是書，還可以是其他東西──它們靜止不動，卻又實際上延伸到各處。", "• 你有沒有看過一盞光線不足，長時間下來會毀了你眼睛的燈？這盞不是。這盞燈剛好提供足夠的光，而它大多是由木頭製成的。", "• 一提到碗盤架，你應該想到後現代性，因為後現代理論常常是枯燥的──或用俗語說，就是乾的。這正是你希望碗盤在再次使用前呈現的狀態。從遠處、跨過一個擠滿行色匆匆、過著沉悶生活的大廣場，尤其在雨幕模糊視線時，這個碗盤架看起來幾乎像什麼都不是。但當你靠近，在廚房裡，你會發現它有一個用來排水的托盤──可能是雨水或是廚房水槽的水──而且由較小的、互相嵌合的方格構成。它會讓你產生思索。", "• 一股氣味像電動車在紅綠燈前發出幽幽嗡嗡聲，車上載著剛從校園音樂劇彩排（像是Into the Woods）出來的孩童，他們的心被成熟的歌聲撐得快要爆開，但仍然很乖，卷雲像親暱的白翼爬獸般在你擋風玻璃外的暮色大地上伸展，向你招手回家——這就是這款以大豆為基底、搭配燃燒時輕聲劈啪作響的雪松燭芯的香味。", "• 普通雨傘的時代已經結束。這就是為什麼這把雨傘不普通：它有點酷。這是一把酷傘。", "我走進一間空蕩蕩的會議室，打給威爾。", "「嗯？」他接起。", "「嘿，兄弟──你還好嗎？」", "「喔，還好。有點難過但撐得住。」", "「我懂你的意思。對了，抱歉換話題──謝謝你那些產品描述。我想我們需要──不是說那些不對，只是得做些微調，所以如果你看到網站上顯示的不完全是你寫的，別介意，好嗎？」", "「當然。我對那些不會太在意。」", "「你明白了。謝謝你。如果你今天寄出發票，款項應該會在下週三入帳。」", "「太好了。你和 Lucy 要不要今晚來我家，大聲朗讀 Ashbery 的詩？也許讀〈Clepsydra〉？我不太想一個人待著。」", "在通往 Will 家的地鐵上，我低聲背誦著我為數不多記得的 Ashbery 詩作之一，《The Chateau Hardware》，是我最喜歡的之一。當我念到那幾行：「It was the great ‘as though,’ the how the day went / The excursions of the police / As I pursued my bodily functions...」時，我注意到有個警察正盯著我看。", "警察讓我感到毛骨悚然，但當我與他對視時，一股憤怒又快樂的情緒湧上心頭，我對他微笑。", "他轉過身去。", "我念完詩：「……變成現在這個樣子，變成向你招手的樣子。」", "露西、威爾和我聚在一起，露絲透過 FaceTime 從加州加入我們。當我們讀完阿什伯里後，決定一起寫一首詩。", "露絲先開始，憑空拋出一句：「明信片被邀請去見大海。」", "露西接著說：「河流把明信片寄給了大海。」", "然後是威爾：「河流像在明信片上一樣，在大海上寫字。」", "然後輪到我：「那條河是我們的實習生。」", "「這裡沒有足夠的張力，只變成你列清單的詩了。」露西笑著說。「那個實習生怎麼了？」", "大約十年前，我做了幾份實習，那時普遍認為實習是走向職業生涯的門徑。這些實習都沒有薪水，暑假期間我都和父母同住。「能夠承擔得起」這種情況——有支持我的父母，確保我大學畢業後沒有負債，整個暑假用來充實履歷但不真正工作——讓我感到羞愧。但這羞愧不足以驅使我認真工作。我以為如果雇主真的需要我，就會付我薪水，既然他們不付，那麼他們給我的工作肯定毫無意義。那確實很無聊。我實習的那些機構——幾本文學雜誌、一個辦創作寫作工作坊的非營利組織——都聲稱他們無法承擔付實習生薪水的經濟壓力。經濟衰退過後，當我已經過了實習生階段、放棄了想找與詩歌相關工作的希望時，紐約通過了一項法律，強制幾乎所有這類機構必須付實習生薪水。奇蹟般地，很多機構都撐了下來。", "從地鐵走回家的路上，我聽到一個有著鼓脹、父親般身形的男人把手伸到腦後對著手機說：「我的問題是我只有一個相當緊迫的時段。」", "我只祈禱這一切會有好的結果——這種可悲、賽博格般的因果合金。", "我那藍色金屬的臉掃視著腳下的人行道。", "當我在沙發上悲傷地灌著葡萄柚味 La Croix 時，露西坐下來親吻我的脖子。", "我轉向她。「哦？」", "當我替她口交時，一股存在從我的胃裡升起，像幽靈又可觸摸，帶著柑橘香，純粹的氛圍。不， 我想——露西和我在一起很久了，身體親密的邊界幾乎無限，但在口交時打嗝會是消失點。", "我停頓，向後仰身，讓碳酸順勢滑回去。我回到露西身邊。又停了一下，轉動脖子，調整核心。一直沒有反應的露西輕輕拍了拍我的頭。", "她把內褲往上拉，立刻在咖啡桌上打開筆電，點播《All About Eve》，那是她只有難過時才看的片子。", "我走進浴室，打開水龍頭，等著從另一個房間聽到旁白，然後放了一個打嗝，我的敵人，持久而無聲，像一條長絲帶從我腸胃間展開到空氣中。"]}, {"type": "section", "title": "帕拉貝爾·巴赫", "paragraphs": ["發明了一種新的呼吸類型，稱為「巴赫」——與歌聲形成對位的呼吸。那是屬於心思不止一、二端的人所特有的呼吸。", "露西和我去現場聽《哥德堡變奏曲》。演奏進行到三分之一處時，出乎意料地，某種反射讓我在劇院裡開始哭泣。", "在冥界之門口，將我的歌投入三頭犬的巨口。", "是要給它們和聲，還是要把它們哄睡？", "我在上班時錯過了爸爸的電話。聽語音信箱時，寒意緩緩爬上心頭，迅速轉為恐慌：「嗨 D__。有空的時候我們需要討論一些關於我健康——以及可能也關乎你——的重要事情。有空請回個電話。」", "我快步走進一間空會議室，手開始發麻。爸爸的父親在罹患攝護腺癌時年紀比現在的爸爸稍長。電話響起時，我迅速試圖調整以面對新的現實：醫院、便盆、慢條斯理且肅穆的博物館之行——他最愛的、世界上最無聊的那些博物館。每個週六早晨我都選擇看卡通而不是和他玩接球的畫面在我腦中閃過。我一直是個糟糕的兒子。", "「聽著，」他接起電話時說。「我不太確定該怎麼說，因為我對確切的醫學術語有點模糊——」", "「嗯，我剛去看牙醫洗牙。牙科助理跟我說了一些有趣的事。其實很重要。關於用牙線——我之前沒意識到——對整個身體都有好處。我講話直接一點。我知道你不是每天用牙線。你需要開始做這件事。還有，你要定期去看牙醫。你的一顆智齒還在那邊晃來晃去。還記得嗎？有可能隨時會發炎。」", "這些話都是真的。我不會用牙線，也不定期看牙醫，四顆智齒只有三顆被拔掉——我對資產階級規範的微小、勇敢的抵抗。鬆了一口氣，手開始發抖。「你說得對。謝謝你提醒。我會的。」", "「好。媽媽要跟你說話。」", "我媽接了電話。她的父親，我唯一在世的祖父，情況不太好。他一月就要過一百歲生日，失智症已經造成影響。我們應該在那之前計畫去看他，以防萬一。", "「字越悲傷，越豐厚，」我躺在社群媒體上寫下這句話時正飄著風，然後又刪掉。這裡的「豐厚」並非指「殘忍」——我是說意義變得更飽滿，像雨雲或段落因為資訊而變得厚實。但你不能指望別人會懂這點。", "無知的水。多事的小字母。粉紅段落，在夕陽下向西漂流。雨開始落下時我躺下，去迎接正在發芽的蠕蟲。", "有一半時間我會把留言從動態中刪掉。比較少見的是我會把剛剛刪掉的歌唱給夜晚空白的 Rolodex 聽。更少見的是，夜晚的聯絡人回了我的電話。", "一半的哀傷是回顧的，另一半是猜想的；哀傷如此科幻。", "每一個字都是一鏟鏟土，掩在棺材上。", "他的音節撞擊在一起，像小石子叩擊。"]}, {"type": "section", "title": "致約翰·艾什伯里（After John Ashbery）", "paragraphs": ["有生命的，肉體被割裂的", "於是字母般地", "他脫了皮", "然後走出外頭", "碰上了傾盆大雨", "數著被作廢的", "媽媽悄步走著並走過", "那條濕透通往大路的小徑", "他就在那條路下開始了", "北方，舌下的核果", "他的腳滿是問題", "而他們計畫裡有一首歌"]}], "ch05": [{"type": "chapter", "title": "十月", "paragraphs": ["欣賞斷頭台的克制。", "法蒂瑪和我被召到我們創意總監的辦公室，參加一場神祕的會議。我們走近她朝北的辦公室牆上的玻璃隔間。她正在講電話。", "「我不喜歡這個，」法蒂瑪說。創意總監招手讓我們進去。", "「謝謝你，」她說完掛斷電話。她的聲音垂下來。「沒事了，」她說。", "「什麼沒事？」法蒂瑪問。", "「不會開除了。他叫我別管這件事了。」", "法蒂瑪面色蒼白。我努力消化這件事。", "「我們——今天會被開除？」我說。", "「聽著，私底下講，是的。但我剛才跟他有場最奇怪的對話。他在說某種——禮物經濟？還有希望大家假期能領到資遣費？但這遲早會發生。很快。天啊，抱歉，我這樣說太不專業了。」", "「極度不專業，」法蒂瑪說，「但很有倫理。」", "「謝了，」創意總監說。「我在努力當個更好的人。」", "「我們什麼時候會被炒？」我問。", "「不只是你。是所有人。我們幾個月後都會被裁員。可能會有人留下來維護網站。再看看吧。說不定會是我。說不定會是你們其中一個。」", "「謝謝你。你這樣說我很感激，」法蒂瑪說。", "在庫存間的鏡子前對著鏡子說新的髒話——一面看起來像二手的全新鏡子。", "「會沒事的，」我告訴她那天晚上，Lucy 說。「不管發生什麼，我們都會互相扶持。」", "「你早就知道會發生這種事。你一直在存錢，」Lucy 指出。這倒是真的。這家公司從一開始就運作混亂，所以有段時間我都假設每個禮拜可能都是我最後一個禮拜。就像因為貓而失眠一樣，我有時會想這種心態如何影響我的個性。", "「你存了多少？」", "我說出數字時感到尷尬。「大概四萬美元。」", "「什麼？你存了四萬美元？」", "「以備不時之需。」", "我被付酬的方式是所謂的 permancer，或者用不那麼冷漠的說法，是永久自由工作者。我按小時計酬，並每月提出發票。差不多兩年前我是以這種方式被雇用的。一年後，在我們母公司屢次拒絕把我列入薪資並提供健保之後，我冒了一次險。我走進我們前任執行長的辦公室——把手插進口袋，好讓她看不出我的手在發抖——告訴她除非她把我的時薪加倍，否則我就辭職。", "「好啊，」她說，沒有抬頭。", "她做得那麼快，幾乎沒有任何明顯的認知失調，我真希望我當時多要三倍。", "「真的？」我說。", "她聳聳肩。「那不是我的錢。我不能逼他們給你健保，但我管得了外包預算。我們一直付你太少。這樣挺公平的。」", "「謝謝你，」我說，沒有掩飾我的震驚。「那很公平。」我轉身要離開。", "「只是讓你知道，」她詭異地說，「我要走了。我無法控制我走後會發生什麼。」", "「我明白。」", "其實我並不明白。她是要給我加薪，還是邀我去她那家鬧鬼的飯店過冬？為了保險起見，我開始存錢。幾個月後她果然離職，現任執行長接任了。", "露西笑得很燦爛。「那真——太不可思議了。聽著，我們聊聊這件事。我知道你討厭工作。表現出來了。你好像有一陣子沒開心了。也許你可以先拿你存的錢，先靠那過一陣子，再開始找別的工作。」", "我思考著這件事。「但我該拿時間做什麼？」", "「你可以寫詩。也許去加州拜訪露絲。我覺得那對我們會很好。」", "我不喜歡最後那句的語氣，但我還是忽略了。", "「我一直想要把In Search of Lost Time全看完。」", "她笑了。「你有工作還能看普魯斯特？」", "「從沒有人一邊工作一邊看完普魯斯特。」", "「那好，那你就可以看普魯斯特了。」", "「我會考慮看看。」", "「Lucy 說得對，」Ruth 在電話裡說。「我覺得這對你可能會有好處。」", "「如果我完全失業的話我會覺得自己像個混蛋，」我說。「也許 Will 可以偶爾帶我去送貨。」", "「不錯的主意。但那樣你就得跟 Will 一起工作。」", "「我們親愛的朋友威爾？」我笑道。「那有什麼不對嗎？」", "「他對工作的儀式感很奇怪。他很迷信——你應該看看他開始寫論文的時候。一次又一次穿同樣的衣服。會在和指導教授見面前一晚睡著，嘴裡還在看 YouTube 上的 ASMR 影片，裡面是星艦迷用小刷子清潔他們的公仔。天知道現在更是怎樣。」"]}, {"type": "section", "title": "維生素 C 的寓言", "paragraphs": ["那位文職人員的組織能力在同事間雖然是傳奇，但在其直系家人眼中，卻被他早晨出門去那份大家都認為他很擅長的工作之前，會用一杯現榨柳橙汁洗他的陰莖這一奇特習慣所掩蓋。"]}], "ch06": [{"type": "chapter", "title": "十一月", "paragraphs": ["或許如果我把被解僱寫進小說裡，會顯得比較有尊嚴。", "Portrait of a Lady是我最喜歡的小說之一。亨利·詹姆斯有時讓人很難想像人物有具體的身體，但那些角色卻活靈活現。他們的心理既複雜又具可塑性，堅硬如鑽石，但只有在與周遭環境的關係中才顯得真實。這些人物像不明飛行物一樣探索新的環境與情境，利用帽子和狗來進行感知與交流：她出門察看那片大草坪時沒有戴帽子，表示她大概會待一陣子；她的表親對她猶豫不決——你可以看出來，因為他那隻猛烈的狗以仰躺的熱切姿態衝向她，而他則從中景的草葉上移開目光，定住下來看她的臉，這一回，還是第一次。"]}, {"type": "section", "title": "夢，11/16", "paragraphs": ["亨利·詹姆斯的鬼不是人形的靈體，而是一種聲音——特別是貓在我胸口呼嚕的聲音。只有當這聲音來自坐在我胸口的貓時，它才是亨利·詹姆斯的鬼。否則，那呼嚕聲只是呼嚕聲，是房間的一部分。", "HEAVEN JUST GOT ONE HELL OF A FIRE DEPARTMENT這張褪色的保險桿貼紙上寫著，紀念九一一遇難者。", "我們就不能讓他們安息嗎？"]}, {"type": "section", "title": "秋天的寓言", "paragraphs": ["在星期五逃班，我飛到休士頓去看我爺爺。", "我十二歲的時候，當我們在 Rite Aid 等著沖洗照片時，他和一個陌生人站在那裡看一張熱氣球的庫存照片。他湊近她耳邊，讓我驚恐地聽到他低聲說：「除了上床之外，這是世上最棒的感覺。」有一次他看到我在讀Catch-22，便問那本書在講什麼。我說是關於戰爭，不過很幽默。他臉色一沉。「你不該讀那些垃圾，」他說。「戰爭哪裡有什麼好笑的。」", "我其他的祖父母在我們真正互相了解之前就都去世了，所以也許我被某種孝順的斯德哥爾摩症候群扭曲了。要是我們不是親戚，或者—天哪—他曾經是我的上司，我大概會討厭他。但儘管他政治觀令人厭惡、公開行為令人尷尬、碳足跡又像體育場那麼大，我還是愛他——而且更重要的是，我也喜歡他。", "當他帶我去博物館時，他會叫我解釋為什麼喜歡一幅畫，我發現自己說出一些連自己都不知道的想法。他是第一個請我解釋自己寫的詩的人——直到今天我也無法解釋自己寫的詩，可能永遠也不會，但那逼我向自己提出問題，這些問題提供了持續創作、而沒有人要求的藝術所需的神祕感。", "我和媽媽從機場直接在旅館碰面，然後開車到他家，他現在有全天候護理，為此他很早就明智地撥出了一筆資金。", "「爸，這是 D__，你的孫子，」我媽說。「你還記得他嗎？」", "「誰？」", "我早有心理準備，但仍然覺得刺痛。「嗨，爺爺。」", "「哈囉！」", "「D__ 是個詩人，還記得吧？也許他可以為你念首詩。」", "「喔。好啊！」", "我媽偶爾會這樣，叫我扮演詩人的角色，去解釋她在The New Yorker見過的一首她完全不懂的詩，或者更糟的是，去解釋我自己的詩——雖然我也知道如果她從不問會更糟，但這種情況還是讓人不自在。在每個家庭場合裡都當詩人既不實際也不值得追求。但我還是盡力配合。", "「好啊！你要聽我最近寫的，還是舊一點的？」", "「嗯，你的那首。」", "我很感動，儘管我知道他根本不知道自己在要求什麼，而我也沒有一首適合這種場合的詩。沒關係—我念給他聽那首我在 Ashbery 去世後寫的詩。", "他聳聳肩。「你說的我不懂。」", "我和媽媽都笑出來。", "「那現在念一首較舊的如何？」我說。", "「當然可以！」", "我走到他的書架，找到那裡唯一的一本詩集——一本古老的 Keats 詩集。我把它從書架上抽下來，讀給他聽〈秋日〉。", "他又聳聳肩。「你把我弄糊塗了。」", "我和我媽笑得更厲害了。", "「所以你是說我跟 Keats 一樣厲害？」", "「甜心男孩，」他說。「那是世上最棒的感覺。」", "他在桌邊睡著了。媽媽讓她的臉沉入哀傷。"]}, {"type": "section", "title": "夢，11/18", "paragraphs": ["我在一座未完工的橋梁盡頭，向虛無撒尿，就像阿維尼翁橋末端的虛無。正在下雪。我們的藍色貓衝向我的尿，但不是跌入水中，而是在雪花中懸浮於水面之上，模糊不清，彷彿置身於 Gerhard Richter 的畫作。他的兄弟，那隻虎斑貓，站在我旁邊注視著。", "小說是無償勞動，而詩則是勞動的灰燼。"]}, {"type": "section", "title": "舉起的寓言", "paragraphs": ["他一隻手抱著自己有罪的確定感，另一隻手抱著精心滋養的、理直氣壯的受害感。但儘管背負這樣的負擔，他的手臂，這不言而喻，從未感到酸痛。"]}], "ch07": [{"type": "chapter", "title": "十二月", "paragraphs": ["在這個月的第一天，幾乎人人都被解僱了，終於。法蒂瑪被留下來當一名「過渡期文案」。我為她高興。我交出我的筆電，然後偷了一把黃色的十三英吋尺。", "法蒂瑪送我到電梯，並把手放在我的肩上。「很高興能和你共事，」她說。「希望有一天我們的路能再相交。」", "外面，下起了大雪，來得異常早，雪片像揉成團的紙片般飄落。", "一排車子被平滑的白色雪堆埋沒，彷彿在向我們賣的那款以設計為主的後庭珠致敬。", "我的祖父今天過世了。", "CEO 寄來一張卡片——圖案是一隻馱著點亮的猶太燭台的馴鹿。「感謝你為我們的組織增添詩意的火花，」卡片寫道，「還有那本書。節日快樂。」", "我把它丟進垃圾桶。"]}, {"type": "section", "title": "垃圾寓言", "paragraphs": ["你們的耶穌不是隱喻，而是真的垃圾。我並非貶抑之意。那個你們稱作耶穌的人恰巧就是一袋垃圾：你把他丟棄，然後又收留他；他最狂熱的追隨者肯定會毀滅地球；你幾乎可以在任何地方找到他。這些都是事實。而這垃圾的愛是真實的。", "失業的第一個月，我就只寫到這裡。說實話：這算不了什麼。"]}], "ch08": [{"type": "chapter", "title": "一月", "paragraphs": ["天堂的詞彙有限。地獄則更有口才。", "今天我祖父本來會滿一百歲。他從不喜歡音樂，但喜歡動物。第一次看到馬、蜂鳥、火蟻、蝎子時，他就在我身旁。他教我貓頭鷹的叫聲是什麼：「誰為你做飯？」", "一場暴風雪襲擊紐約。公寓窗外，雪堆積在建築物上。整個城市被覆蓋，像是裝上了消音器。多年來紐約沒下過這麼多雪。我想知道在我有生之年還會降多少英寸；紐約的雪，像詩裡一樣，是借來時間的簡寫。", "公寓的牆開始震動。我猛然坐直——地震？同一晚又遇到暴風雪和地震。只有在紐約才會這樣。然後，透過牆壁，一個男人爆炸似地呻吟道：「哦。我的。天。」房間停止晃動，又再開始。非常微弱地，另一個人說：「我覺得你在做的事從解剖學上來看不太可能，不過我挺喜歡的。」", "雪以解剖學的方式飄落。我挺喜歡的。", "一份失業者也許可以有益忽略的物品清單。", "從樹樁上唱出的星光？", "地栗從它的節縫裡唱歌？", "有斑紋的貓頭鷹從它的廚房裡唱歌？", "星光在眼中終止。地栗在空氣中終止。不再是詩，一個光合作用的過程掩蓋了它綻放的肉體。", "想到阻止我整天、每天都想出這種念頭的唯一原因竟然是有酬勞的工作。", "在過去三週裡，我進入了一種近似迷幻的無聊狀態——一種心靈空間，就像我為祖父葬禮打包的這雙襪子，柔軟的洞穴尖端帶著金色，鑽入像午夜般深邃、薄如紙的黑暗。", "在休士頓，追思會結束後，露西和我跟著父母回到我祖父的房子。", "「拿著這個，」我媽一邊從車上走下來一邊把骨灰罈遞給我，「我們要拍一張全家福。十分鐘內準備好。」她摔上車門。", "那是我第一次也是唯一一次抱著他全部的重量。我打開蓋子，端詳著骨灰，尋找那位為 Astrodome 設計空調系統的人的痕跡。爸爸把手放在我肩上。", "「別打噴嚏，」他一本正經地說。", "大家庭親友聚在一起，場面一片混亂。我們各自從幾個房間裡撿起幾樣想留下的東西。我挑了一件襯衫、一把沒弦的小提琴、幾張照片。", "「看這個，」爸爸從車庫進到廚房，手裡拿著好幾把鋸子說。「你見過這麼多鋸子嗎？」他揚起眉毛。", "「你為什麼拿著那些？」媽媽瞪著他說。「大家都要集合拍張照。」", "「你覺得拿這件襯衫會不會很奇怪？」我對露西說，將它拿到胸前比劃。「我覺得很合身。布料也不錯，但我不想他會那種，像是來糾纏我的感覺。」", "她盯著我看。", "「我想我會帶走它，」我說。", "「我們現在要拍張全家福！」我媽在廚房跺腳，櫥櫃裡的碗盤發出叮噹聲，然後一下子哭了起來。屋內頓時安靜下來。Isidore 叔叔沒從書上抬頭。", "「你還好嗎，」隔天在機場等候登機時，我對 Lucy 說。", "她想了想。「有時候，想參與自己的家庭會很難，」她說，捏了捏我的手。「但那件襯衫穿在你身上會很好看。」", "飛回家後，我拿出一些存下來的錢，給自己安排了一次短期寫作駐留──緬因州一間民宿的房間，住一週。我開車到一個極寒之地。每天，太陽在下午四點就下山了，我就為自己放一個熱水澡。這是我在那裡最接近創作的活動──我什麼也沒寫。"]}, {"type": "section", "title": "孤寂的寓言", "paragraphs": ["我和伊莉莎在大學的寫作工坊認識。畢業後，她搬到林中。她是個隱士——不過是個友善的隱士——住在州內一處偏遠的沼澤旁，沒有電也沒有室內水管。八年前我從一次健行回家，路上需要找個地方過夜，於是打電話給她。她毫不猶豫地收留了我。我們那時大概二十二到二十七歲，有著廣泛的朋友與熟人，對這種款待視為理所當然；在真正開始各自的人生之前，我們還沒把人推開，直到時間變得緊缺、年齡與疏離像大陸漂移般發生。", "第一次造訪是夏天。當我到達時，她笨拙地用一把看起來從未用過的大斧頭劈砍一段木頭。我準備念詩的研究所，她在做某種不知名的事，我對她的隱居與對這套生活方式的堅持感到驚訝。", "我們在她小屋後方採野生藍莓，邊採邊聊寫作。伊麗莎說她從大學時代就一直在寫一部小說，但每次完成一個草稿後，她會重讀覺得不夠好，就丟掉，從頭再來。", "「你不是認真的吧，」我說。「你連草稿都不存？」", "「沒意思。」她咧嘴笑。「這樣過程才新鮮。如果我回頭再修——我了解自己。會把它悶死。你難道沒對一首詩這樣做過嗎？」", "我想了想。「有一次，」我說，「我不小心刪掉一首詩，然後憑記憶把它重寫了。」", "「然後呢？」", "「第二次比較好，」我承認。「但那畢竟是首詩——大概不到二十行。」", "「你記住了值得記的段落，讓那些不有趣的部分悄悄溜掉了。」", "太陽下山後天氣轉涼。我把睡袋從收納袋裡拉出來，她邀我一起上床。我爬進去，她把燈關了。漆黑一片。", "「你覺得這浪漫嗎？」她突然開口。我看不見她的臉。", "「其實……是的。」我說。", "沉默了一會兒。", "「來看我的人總是這麼說。我想也有道理。但我不想讓你誤會——這是我的生活。我不會離開。這不會有什麼結果。」", "但我很困惑。「你為什麼要邀我上你的床？」", "「因為我覺得和你很親近，」她毫不猶豫地說，轉過背面向我，把身體貼在我身上。「但這不是浪漫的事。」", "八年後，剛下過一場新雪。我把車停在結冰的土路盡頭，走過樹林，進到小木屋，爐裡有兩塊木頭還在悶燒，伊莉莎在上面放了一壺菊苣茶，並留了一張紙條叫我自己倒一杯。地板冷得刺骨；外頭的沼澤正處於某種試探性的解凍狀態。差不多一小時後，一位我不認識的女人走進小木屋。我們相互盯著對方。", "當我認出她時，我同時理解了好幾件事：我根本沒把她的長相記準，因為她完全不在社群媒體上，我也沒有她的照片；在至少八年，甚至很可能更多年裡，我沒有真正忘記過任何人的面容；Eliza 已經變老了，顯然我也是；忘記了 Eliza 的臉，並在此刻重逢時只能模糊喚起記憶，再被這幾年的面具覆蓋，讓我欣喜地悲傷。我覺得自己像是跨到時間的旁邊，但又比以往任何時候都更深地捲入其中。", "「嗨，」我終於說出口。", "「你最近如何？」", "我們談到天黑。透過窗戶，在樹梢間的月光下，我看她熟練地把斧頭舉起，砍向冰冷的空氣，輕而易舉地劈開一大段木頭。她重新進到小屋裡，把它丟進火爐。", "「你為什麼在這裡待這麼久？」我說著，她搓著手。", "她聳聳肩。「我愛這裡。這樣生活很辛苦，但我擅長。不是很多人有這種經歷，似乎值得擁有。這對我的寫作有幫助。」", "「你最近在寫什麼？」", "她咧嘴笑。「同一本小說。」", "「滾開。這是在做給人看的表演。」", "「我在為誰表演？你嗎？該對的時候自然會對。」", "我把睡袋在地板上攤開。她關了燈。", "「見到你真好，D__，」她溫暖地說。「很高興你能來。」", "「你知道嗎，」我說，「你剛進來的時候我差點沒認出你。好久沒看到你的照片了。有那麼一瞬間我以為你是個完全不同的人。」", "「嗯，」她說。黑暗一片，她的語氣很認真。「我還是一樣。」", "黑白影像，只有玻璃中微弱地映出我自己的臉。他看起來年輕，大概二十多歲，也可能是十幾歲末期。陽光強烈地打在他的右側，長褲燙得筆挺，褲管上有一道深深的摺痕，房子左側映出一棵小樹斑駁的影子。他站得非常挺，離人行道略遠。他的姿勢顯示他在努力保持不動。頭髮修得整齊，他穿著外套和背心。是一種領結式短領帶嗎？很難說。大概只是澎得很硬的襯衣領。他沒有在微笑，但嬰兒肥微微豐滿了嘴角，使他看起來既嚴肅又帶著永遠困惑的表情。他把幽默感塞進肚子裡，免得它流到四肢。一隻鴿子站在他右手的掌心，伸長脖子，直直地盯著光源看。尾羽垂在他的手上。他的左臂鬆鬆垂在身側。", "當我描寫他時，我成為了自己；當我模仿他時，我也成為了自己。然後那一刻過去，在這兩種情況下，我又變成了別人。"]}, {"type": "section", "title": "夢，1/31", "paragraphs": ["「繼續啊，那股衝動不會自己停的。別騙自己。我聽見它在你身邊迴盪。那是世上最棒的感覺。」"]}], "ch09": [{"type": "chapter", "title": "二月", "paragraphs": ["失業一個月後，我開始讀普魯斯特。《追憶似水年華》：一本讀起來耗時漫長的書，你無可避免會在這段時間被改變。但會怎麼被改變？", "露西坐在沙發上我旁邊，在她的筆電上看電影。我拍了拍她的肩膀。她取下耳機。", "「等我把普魯斯特看完，你會告訴我我變成什麼樣子嗎？」我說。「我擔心自己注意不到改變發生。」", "我翻開《追憶似水年華》第一頁。"]}, {"type": "section", "title": "派對的寓言", "paragraphs": ["威爾和我坐在一間文學雜誌辦公室角落的沙發上，參加一期新刊發表會。一個穿著量身訂做的米色小丑褲、外搭褪色黑色連帽衫但裡面沒穿襯衫的男人坐在我們旁邊，點了一根菸。", "「可以借一根菸嗎？」威爾說。", "「這是 Aesops，」他說，從一個小金色紙盒裡抽出一根菸。「你會嚐出差別的。」", "「那個奢侈肥皂公司？他們也做菸？」", "「限量版的。」", "「我也想嘗嘗有什麼不同，」我說。「可以借我一根嗎？」", "「你們可以一起分著抽。你們是作家嗎？」", "「我們是詩人，」威爾說。「但我真正的熱情是送辦公室家具。」", "「我現在失業，」我說。「我一直在讀普魯斯特。」", "「我聽到了，也很喜歡，」小丑褲連帽衫說道。「你的詩是關於什麼的？」", "「大多數都不押韻。」", "「最近我很迷中世紀寓言和懺悔，」威爾說。「你是作家嗎？」", "「我是一名新聞語言雕塑家。」", "「這支菸真的很好抽，」威爾說，遞給我。我吸了一口。像是木炭加小黃瓜的味道。「但你剛剛說的那件事是什麼意思？」", "「我剛從史都加特回來。待在那裡的每一天，我都走進城市外的森林，對著蜘蛛網手淫。」", "「哇，」我說，「我有聽過那個資助計畫。」我是真的聽過。「恭喜你。」", "他點了一下頭。", "「抱歉，如果我誤會了的話，」Will 說。「我以為你說你在雕塑語言？」", "「射精不是語言嗎？」他說，伸長脖子在我們周圍張望並招呼某人過來。「你知道 semen（精液）的語源是『種子』嗎？就是去播種。而蜘蛛網是自然界中最不虛構的結構。我的父親是猶太人，我的外祖母在柏林圍牆倒塌不久後的一次阿爾卑斯滑雪行程中被一隻德國牧羊犬咬傷。所以我承載著相當的歷史與創傷。透過把我的種子釋放到『網』上——」他用手指在空中比出引號，這讓人困惑，因為他指的是字面上的蜘蛛網——「我希望闡明歐洲法西斯主義的根源。就是我。你在這裡認識誰？」", "「沒有人。我們是從網路上聽說有派對，」我說。「我父母兩個都是猶太人，」我又補了一句，不知為何。", "「天冷了，這是紐約唯一可以室內吸菸的地方，」Will 說。", "有人從派對人群中伸出一隻手，就在小丑褲子臉前，手裡握著一把鑰匙，鑰匙頭沾著一大塊潔白粉末。他抬頭，滿臉擔憂，眉頭緊皺，眼睛在我們之間來回掃視。", "「你們的可卡因是無麩質的嗎？」一個小型笑氣罐在幾步遠的地上叮噹掉落。", "「那不是我的手，」我說。我把手舉到空中給他看。威爾也照做。", "「你們兩個真了不起，」他說，粉末被他努鼻吸走。那隻手又消失在群眾中。「『那不是我的手。』你們真是詩人。」", "我的同輩們，白色、膠狀——一群會走路的魚糕堆，擁有機智與語言能力。", "我穿著內衣讀著Swann’s Way，露西下班回家。她看起來精疲力盡。", "「聽這個，」我說。「‘在花叢與它們倚靠的那塊變黑的石頭之間，如果我的眼睛看不出間隔，我的心靈便預留了一個深淵。’ 這句不是很棒嗎？」", "「哇，」露西說，一邊用面紙撿起那團我自從藍貓那天下午吐出來後就沒理會的濕毛球。「聽著，我們公司馬上要結一個期刊，我快累垮了。如果你不打算煮，要我幫你跟泰式外送點什麼？」", "「醉麵，謝謝。等這一切結束我再找到下一份工作──你覺得我們會把這段稱作過渡，還是深淵？」", "「我想那得你自己決定。」", "愛不是偶然，但某種大氣擾動字面上就是偶然的。", "「我有跟你說我在農夫市集遇到切斯特嗎？」露絲在電話那頭說。", "「詩歌學校的 Chester？你是說那個 U BE PUBE Chester？」", "「對啊！他提著一袋南瓜。我們這週會去喝一杯。會很有趣，看看……他袋子裡是什麼樣的南瓜。懂我的意思嗎？」", "「是的，不幸的是，你講得白紙黑字。」", "「我指的是他的生—」", "「嗯，知道了。我一直很喜歡那個人。」", "「他已經不是詩人了——他在 Apple 工作，還在一個前衛爵士樂團裡吹持續音單簧管。」", "「持續音單簧管？」", "「他是這麼形容的。我在 Spotify 上聽過，比聽起來好。」", "「我相信你。他在 Apple 工作這點就有點令人不安。」", "「管他的。至少他把自己的事整理得很好。我不再開玩笑了。我現在只跟那些對建立未來認真、並且像尊重其他人的職業一樣尊重我的藝術的人約會。他們應該有一份好工作，至少要讀過 Creeley，如果我們發生無套性行為還應該願意把我列入他們的健保，而如果他們在四十五分鐘內沒回我簡訊，那就是在 gaslight（操縱感覺）。半夜的話兩小時內沒回才算。」", "「一個以前是詩人、現在在科技業工作、業餘做音樂的人——這傢伙或許真的符合條件。」", "「他一百八十公分——只比我高幾公分。我不知道。」", "「很想知道這次約會會怎麼樣。」", "「你呢？你和 Lucy 怎麼樣了？」", "「我覺得我們可能有點陷入僵局。我沒工作這件事讓她有點受不了。我們其實沒有在進展——我經常睡在沙發上。身邊的每個人都在改變他們的人生，而我們一直停留在原地。」", "「無論你們兩個要去哪裡，我知道你們終會在那裡找到自我。」", "「你聽起來像住在洛杉磯多久了？」", "「我是認真的。時間以如此細微的方式改變我們，以至於我們在它發生時察覺不到。凡事都有時程表，如果你能弄清它是什麼。」", "威爾傳訊說他下週有份工作，要把一些家具搬到曼哈頓的一棟新大樓，問我想不想順路幫忙。他可以給我幾百美元現金。"]}, {"type": "section", "title": "夢，2/27", "paragraphs": ["一隻對我說話時沒有牙齒的獅子，把牙齒放回去後說得更清楚。", "你想吞下多少話都可以，但它們仍然無法下嚥。"]}], "ch10": [{"type": "chapter", "title": "三月", "paragraphs": ["如果你細心聽，會發現地鐵在自我合唱三部和聲——但要小心那列用三個聲部歌唱的列車。它帶你去不了任何地方。", "幸好，我已不再是通勤者。", "即便是地鐵的緊急聯絡系統，也自帶詩意。", "去談談", "按下，釋放", "然後等待", "穩定的光芒", "押韻斷句不錯。但這名女子的褲管被冥界的滑門夾住，我們還要等多久？", "「救命！拜託，救命！我的褲口被萬有引力的走狗扯住了！」", "在二手／新書店裡，那本二手書《The Diary of Vaslav Nijinsky》的書脊上，不知為何「diary」這個詞被劃掉了。"]}, {"type": "section", "title": "凸面鏡的寓言", "paragraphs": ["我和威爾在晚上八點開著滿載家具的廂型車抵達下曼哈頓的辦公大樓。", "「這些東西是漂亮還是垃圾？」當威爾打開廂型車後車廂，露出一疊幾何般的灰色和米色角落時，我說。「說真的我分不清。」", "這算是家具嗎？確實，那是附有椅腳的平板金屬、木頭和布料——有人可以坐或放較小物品——靈感來自真正的桌椅，這點無疑。但這些物件真的是幽靈裝飾、家具的奇蹟現身，或是傢俱機器 3D 列印出的鬼魂嗎？", "「那就是辦公家具的宗旨，」威爾一邊數著車廂裡的件數說。「讓員工同時感到富足又被貶抑。無論如何，它很貴，所以小心點——該死，總共有十三件。」", "「那有問題嗎？」", "「——沒事。只是差一個，就不是十四行詩了。十四是幸運數字。」", "「這是你的小工作儀式之一嗎，數家具？」", "「我是個形式主義者。」", "我們把一張沉重的茶几從廂型車抬出來。用膝蓋發力，我們以小步滑行的方式，像仙女般輕盈地把它搬進貨梯。", "「快一點，夥計們，」大樓經理說。「我想快點回家。」", "電梯門開了，映入眼簾的是一條被玻璃牆與辦公室隔開、閃閃發亮的走廊。室內的開放式格局顯露出一排會議室和數間較小的高層辦公室，也都是玻璃隔間。我一邊用腿頂著茶几一邊開門。我們屈膝，輕輕把它放到地上。", "「做得好，」威爾說。", "我們把所有傢俱都搬下來，直到只剩下一件物品——一顆令人著迷的反光球體，像一滴南瓜色的水銀在廂型車後方閃閃發亮。它並不特別沉重，但笨拙到需要我和威爾一起抬著。", "我們迅速有效地把它從服務電梯取下，因為負擔輕而動作俐落。我盯著它看，被那凸面的倒影吸引——我們的手和軀幹在它銀色的外殼裡變得巨大，辦公室的燈光在球面上閃耀並彎曲，像一場流星雨從我們弦月形的頭頂滑落，當我們沿著走廊走時如此映現。", "「你這方面不差嘛，」當我們走近辦公室門口時，威爾說。「也許我們剛發現你隱藏的天賦。」", "「我沒有什麼隱藏的天賦。全部都在這表面上，」我說。", "「表面只是可見的核心。小心你的——」", "就在那一刻，我的背撞上了玻璃門。它碎成了十萬片。", "我們互相對視，手裡握著那顆鏡面球，建築內警報大作，碎玻璃閃爍著頻閃燈光。", "隔天我傳簡訊向威爾道歉。", "我這樣做會不會有害處，讓我變得這麼笨？", "我覺得還不錯—悔意、誠懇、句法上有趣。威爾喜歡這類東西。但奇怪的是，他沒有回。", "最後他沒有被開除，但他要負責—幾天後他終於發簡訊告訴我—替換那扇玻璃門。當然我放棄了我的運送分成，並且又從存款裡拿出幾百美元跟他分攤。", "他不會對我一直生氣。但可以肯定的是，我的辦公家具運送事業就此結束。"]}, {"type": "section", "title": "夢，3/16", "paragraphs": ["彷彿被聲音迷惑，我在一座大宅裡跟蹤著小旋律。我發現一隻貓蹲在一架小型三角鋼琴裡銹跡斑斑。當牠的耳朵抽動時，金屬屑脫落，飄落在琴弦間。牠看著我，眨了眨眼，尾巴掠過一個 C 音，伸爪碰到 E 小調，爪子撥出一個 D。我明白，就像我去看醫生一樣，這隻貓正被這音樂治療著。", "貓。試想。拒絕外在於自我的勞動。在法庭上用舌頭洗澡。", "作為一名詩人，我感到美妙且有用——但只有在下雪時坐在一扇乾淨的窗邊。", "雪：一個即將結束的副詞。", "有用性：一種不同於勞動的類型。", "美：見上。毀壞球。", "整潔：在虔誠之後。詩人誤將其稱為「清晰」。", "Windows：一個為衝擊而作好準備的副詞。", "Godliness：一間法庭。", "今天是露西和我的第七個週年。", "有些事我因悲傷而獨自收藏，有些則是因極致的幸福，讓我難以辨識那是什麼。"]}, {"type": "section", "title": "七年", "paragraphs": ["愚蠢的花朵回應那首詩", "「誰想去打獵」或是其他什麼鬼名字", "我所知道的關於太陽的只有這些", "讓我的面具難以駕馭", "「誰願狩獵」或不知哪門子的東西", "使我想起母語的泥土與", "讓我的面具難以駕馭", "用另一個字租借這張面孔", "使我想起母語的泥土與", "像部被抹去不再重複的電影", "用另一個字租借這張面孔", "我輸入七位數，撥打那個號碼", "就像電影在燈一亮時被抹去", "那麼，你來了", "我輸入七位數，撥打那個號碼", "D-A-F-F-O-D-I-L一個字一個字地，", "那你就拿去吧", "這是星座圖", "D-A-F-F-O-D-I-L一個字一個字地，", "包括，對，額外的數字", "聽見那些星座", "你也合上書本去聆聽", "包括，對，額外的數字", "除了你之外，先前無人聽見", "你合上書本去傾聽", "啞然的花朵回應那首詩", "除了你之外，先前無人聽見", "我所知道關於太陽的，只有這些："]}], "ch11": [{"type": "chapter", "title": "四月", "paragraphs": []}, {"type": "section", "title": "兩個牧羊人的寓言", "paragraphs": ["兩個牧羊人走到山脊上。其中一個遭受了不便，氣得發狂。他掃視山谷，低聲念道：「我要用我的角刺穿雲朵！」", "另一個站在後面看著他的同伴；不僅僅是看他，而是看著他整個人。", "「天哪，那真的是你的真角嗎？」", "一對交往已久的情侶在四、五年後會明白，重複的唯一規則就是不同。你會對同樣的笑話發笑、跟對方吵同樣的架、醒來時旁邊仍是同一具身體，但時間會帶來那些幾乎察覺不到的變化。當你剛和某人安定下來，就會發現你的生活已經改變。交往到第七年時，這些變化便成為無法撼動的規則。", "當我把為 Lucy 寫的 pantoum 交給她時，她摟住我並在我耳邊親了一下，驚心動魄地差點沒親到我的臉頰。她把詩夾在她正在讀的書裡，然後——我很了解她——就忘了。我學會珍惜這一點，等待多年後有一天她翻開那本書時，這件意外的遺物會飛出來被重新發現。", "「我們每天所擁有的時間是有彈性的，激情會擴展時間，我們所喚起的激情會壓縮它，而習慣填滿剩下的部分。」（普魯斯特，發芽的樹林中）"]}, {"type": "section", "title": "夢，4/8", "paragraphs": ["「漂亮的眼睛。你一直都是這樣的嗎？」"]}, {"type": "section", "title": "兩個手機鈴聲的寓言", "paragraphs": ["兩個鈴聲在黑暗的電影院裡互相歌唱。", "第二個鈴聲如此迷戀自己的聲音，以至於在聽到這些時靠了過去，然後跌入，激起一灘聲音的濺落裡溺斃。", "我在一家咖啡館工作。一種世代性的病症：螢光白的蘋果懸浮在我們每張桌子的大腿上方，那是我們從外婆式的零工經濟的狼爪手中卑躬屈膝接受進我們紅色披風裡的蘋果。我也不例外。我想，如果電子郵件聞得出發信者的味道，我們可能會寄得更少。這是一種幾乎完全與身體脫節的寫作形式。我查看了我的郵件，裡面——並不令人驚訝，因為我沒有投任何履歷，但仍然令人失望——沒有工作邀請。", "房間另一頭傳來像小妖精般的哀號。我抬頭與桌對面的同齡女子對上眼。她微笑。我慌了。我曾經很會調情，但這技巧已退化。", "「不可能那聲音是從真實嬰兒發出來的，對吧？」我說，緊張地笑著，敲了敲指關節。她的目光迅速又落回螢幕。", "那匆匆一瞥是我的奧黛特。電子郵件是我的阿爾貝廷。", "筆記本比詩更私人，但差別不大。為一個人的觀眾而表演。或者它們是兩個陌生人在公共場合之間無聲對話的逐字稿。當下與將來之間一次雄辯的目光接觸。", "隱私，一種公共價值。", "今天是我的生日。Lucy 和我去我們最喜愛的披薩店。我們邊吃邊默默閱讀，我告訴自己這並不令人沮喪，因為我們喜歡一起閱讀。在那張桌旁，當我迎來三十三歲，我的耶穌年，我想起普魯斯特對 Odette 衣著的描述：一種近乎文明邊緣的科技華服。Lucy 和我並未為這個場合打扮，但年齡本身就是一件衣裳，而對耶穌而言，三十三歲幾乎是他接近文明邊緣的年紀。", "更老、更慢、更悲傷、認知更遲鈍，但比以往更好。", "靜下心來，讓你的眼睛適應它動態中更細緻的色調，你便會看到，無論是從泛紅的沙漠遠景，或是從一間餐廳遮棚那窄窄的樹枝下——服務生在那裡抓住他抽菸休息時的甘露——雨那嬌柔、幾乎害羞的方式如何掩飾它總是以地獄之路降下的事實。", "我們知道，期待意外的危險在於驚喜會變成例行公事。但當我一再計算自己欠紐約州和美國政府的金額時，我發現我根本不必為此擔心。看著這個數字就像第一次遇見The Waste Land，或像在荒涼道路上有飛行器在你上方盤旋，然後用一道光束把你拉起來。幾乎是瓦格納式的巨額——藝術而驚人。", "自從十二月起，我已把四萬美元的存款編列預算要支撐到夏天，也許到明年。過著節儉但舒適的生活，繳完稅後剩下剛好一萬多點。雖不至於致命，但確實有致命感。我的小型退休恐怕得比我希望的早些結束。"]}, {"type": "section", "title": "夢境，4/20", "paragraphs": ["露絲解釋說，她的香料就是她的貓。", "「看見了嗎？」她說，雙手比出一個等號框住香料架。「這些是我的貓。」", "想像一首以描述非它之物的方式來描述某物的詩。莎士比亞在一首十四行詩中就是這麼做的，開頭是「我情人的眼睛不像太陽」。芭蕉的詩不知怎地會在他遇見的人名與地名中拼出已逝之物。"]}, {"type": "section", "title": "不像芭蕉", "paragraphs": ["沒有黑髮山。", "沒有換洗的衣服。", "沒有名叫 Double（Double 為專有名詞，保留原文）的年輕女孩。", "沒有那位我曾偷過詩的朋友。", "沒有馬兒帶著錢回來。", "沒有名為「死亡屏障」的房子。", "沒有「奪命石」。", "沒有鏡子，沒有儀表。", "沒有腳，沒有球鞋。", "沒有人，沒有植物，沒有暖氣，沒有喇叭。", "我在讀普魯斯特時，露西在沙發上坐到我旁邊。", "「我想我們得談談，」她說著，突然哭了起來。", "「我只想做的事，」我在電話裡對露絲說，「就是爬上我的車，橫越整個國家，一路踩到底把它開進太平洋去。」", "「你們兩個在一起很久了。我不覺得這是個錯誤的決定。」", "「這會像一場沉默的瑜伽靜修，」我繼續說，「只是沒有誰用溫柔的聲音叫我去折磨自己，我可以一邊看著景色變換，一邊死去。」", "「你什麼時候要搬出去？」", "「我也不確定。我們倆都不急——我要先去跟我父母住一陣子，等我找到工作就會自己找地方住。」", "「聽我說。不要拖泥帶水、把事情弄得痛不欲生。要做得乾脆利落。」", "「你聽起來像個黑幫老大。」", "「露西近況如何？」", "「她很難過。我們都很難過。不過貓咪們看起來還好。」", "「你知道，我的課程下個月就結束了。如果我七月初飛到東邊來，你開車載我回灣區怎麼樣？公路旅行！也許我們可以沿路安排一些朗讀會。而且你可以更認識 Chester，還能見見 Homer。」", "「Homer？」", "「那是我和流浪貓 Chester 收留的那隻貓。」", "「我還不知道你們已經到了領養貓咪的階段。」", "「他真的很棒。」", "我沉默不語。", "「愛你們兩個，」她接著說。「有需要就跟我說。我明天就訂機票。」"]}, {"type": "section", "title": "面具的寓言", "paragraphs": ["她很愛護她的面具。例如，她的每一個面具都有自己的面具，而她又不遺餘力地確保這些面具之面的每一個面具本身也各自擁有一套精緻的面具。但她的慷慨就止於此。"]}], "ch12": [{"type": "chapter", "title": "五月", "paragraphs": ["我一直懷抱著一種幻想，能在不學習的情況下就知道某件事。我之所以有這種幻想，是因為當我第一次見到露西時，這件事真的發生過在我身上。", "威爾在圖書館把我們介紹給彼此，那時我們還在念研究所——他們一起上過一門研討課。我被她的美貌驚到了。她的臉像手寫字。要花點時間去辨認其複雜處，那優雅而凌亂的速記法以及動態的複雜性，但不久我就學會了如何讀懂它，成了她實際語法的延伸。第一次約會時，我們在城邊的一座墓園裡散步。她說：「我覺得他的鬍子，像鮑伯·羅斯的，對我而言可能算是他聲音的一部分？」後來，當我讀她的詩時，我認出了那種風格。", "「我想我要把那句話教給我的詩歌學生。」", "「你的學生很幸運。」", "「能在大學教室裡從火星傳來句子然後從你嘴裡聽到？我同意。」", "「每週兩個半小時能看到你這一眼。」", "頭頂的天空像綠色腦珊瑚。天快要下大雨了，但我們已經停下腳步。彼此對望了片刻。她點頭望向那些墓碑，眼神沒有離開我。「我想他們要我們走了。」", "當她這麼說的時候，她的表情變了，或者也許是我的先變，然後又回到她那裡。彷彿我們的雙眼在太陽穴後同時被打出一道瘀青——被一個靈巧、保濕良好且看不見的天使之拳同時擊中。", "我們就在彼此的存在裡這樣溶解了七年。但這一切都不等同於未經學習就知道某事。我在沒有學習的情況下知道的是，露西和我其實已經碰過面，雖然我們並未如此，並且會在很長一段時間裡繼續彼此認識。", "那種現實就像開車進山時漸漸消失的收音機訊號。你可以繼續在心裡哼那首歌。你很熟悉它。但已經不一樣了。"]}, {"type": "section", "title": "夢，5/3", "paragraphs": ["我的社會安全號碼出現在黑色背景前，五個數字來回閃爍到四個。", "露西和我達成了一種不安的平衡。我睡在沙發上。當我們不說話時訊號比較清晰——我事後回想，幾個月來一直都是如此。"]}, {"type": "section", "title": "植物園的寓言", "paragraphs": ["在公共花園裡：人們走著、整理頭髮，悄悄靠近鬱金香，女人們近距離交談，一個德國男人幾乎像在替手機哺乳般地抱著它，對著手機說「Da」。", "在公共花園裡：似乎有某種東西不喜歡一堵由不死水仙組成的牆。", "儘管如此，儘管他們有行李，那些景觀設計師還是帶著澆水器走向它們。", "一種我並未親身體驗的喜悅仍然命令我揮動四肢。", "更具體地說，這種喜悅命令我把雙手舉起。", "然後像我根本不在意似的揮舞它們。"]}, {"type": "section", "title": "文法寓言", "paragraphs": ["「我比較喜歡文法。」", "「對我的詩？」", "「是的，但也是關於你詩的主題。」", "「你比較偏好把文法當作一個概念？」", "「不，是當成一種經驗。」", "奧菲斯從空氣中偷走髒錢並重新分配。花朵傾身傾聽。", "這些我所記的筆記是你的。", "我從夜間散步回來。白天變得更長，滲進夜裡。今晚的光線暗淡帶紫，公寓悶熱如水，靜謐。我推開浴室門。露西坐在冒著蒸氣的浴缸裡。", "「嗨。」", "「我可以進來坐你旁邊嗎？」", "「好啊。」", "我靠在洗手槽邊，捲起一根大麻菸。", "「你那樣做看起來很酷，」她說。", "我低頭看著浴缸裡的她，頭髮微濕、臉頰微紅。她在微笑。", "「哦？還有我做什麼看起來很酷？」", "「不多。最好別把這技能丟了。」", "「不知道。也許我終於會讀完《Middlemarch》。」", "「廢話。你會一直重播看佛瑞德和金格電影，然後貓會為了誰能直接睡在你臉上而打架。」", "她笑了。「你想進浴缸嗎？」", "我朝她看了一眼。", "「我們都知道不會發生什麼事，」她說。「但能貼近一點會不錯。」", "我滑進對面她的浴缸，水龍頭像銀色鸚鵡般架在我的肩頭。我們尷尬地並肩而坐，膝蓋相抵，然後慢慢開始接觸。水溫比溫暖略高，但還不到燙。貓咪們從馬桶蓋上看著我們。", "「我們從沒一起泡過澡，」我說。「為什麼？」", "「我們不用。整整七年就是一場澡。」她用力抽了一口菸。", "「我一點也不會想要回到過去任何一天，」我說。", "「我本來要—」露西剛要開口，卻被一聲巨大的打嗝擠到一邊，聲音在磁磚上反彈，受驚的貓兒衝進走廊。一縷煙從她口中繚繞而出。", "當我們一起笑得比幾個月來任何時候都更大聲時，我知道——不需學習便能確定——我會記住這一刻，並在餘生不斷以不同版本重溫它，像是一則神聖的迷因。", "露西是個睡得像英豪般的人。對她來說，那是一門藝術。她一關燈就立刻到了別處。她的夢，當她曾與我分享時，是敘事梯度、大氣意象與邏輯漂移的傑作，不亞於她的詩。相比之下我睡得很淺。", "貓在半夜把我弄醒。那隻藍色的在另一個房間叫——牠記性短，在黎明前的幾個小時裡常會驚慌以為我們離開了。我每聽到那聲心就碎了。虎斑貓坐著無聲地看著牠，並發出呼嚕聲。我有時會起床陪牠坐到牠安靜下來，凝視著鐘塔上微微旋轉的發光紅色指針。", "我在他耳後揉著毛，告訴他我們在這裡，會照顧他，甚至愛他，還會在早上餵他，如果他願意，也會讓他藉由我們的詩歌說話，只要他肯讓我睡一會兒。但他似乎不知道自己想要什麼，儘管渴望本身對他來說強烈而鮮明，他卻從不記得我說過的話。", "我回到床上。露西沒有動。", "我看著她，沉沉睡去，想知道她此刻正在看見什麼。", "我閉上眼，又張開。"]}, {"type": "section", "title": "模因的寓言", "paragraphs": ["一道閃爍的模因穹蒼，既熟悉如古人的歌謠，又奇蹟般清新如山間的冷溪，將其天籟般的雨水灑落於他們每一個人世間的作為。"]}], "ch13": [{"type": "chapter", "title": "六月", "paragraphs": ["奧菲斯試圖再演奏一首歌，但一團厚厚的蒼蠅雲不停地讓他的七弦琴斷音。", "我家鄉那一帶風把樹葉吹得沙沙作響的聲音，詭異地像 Steely Dan 那首歌《Do It Again》的開頭和弦。", "「我們的社會真是分裂得厲害，」我媽皺著眉，啜著她的半咖啡因冰咖啡說，「但我想我們都同意大自然很了不起。即便是那些砍樹、污染飲用水的人。他們做了那些事不可能覺得好——誰會覺得好呢？就算是世界上最壞的人也不會。話說回來，這倒讓我希望我真能相信地獄，這樣我就知道有個地方給他們。花——我是說，你開玩笑吧？它們就像巫術！而且是那種好的巫術！」", "吃晚餐時——彩虹鱒、糖荚甜豌豆、加了蒔蘿的烤馬鈴薯，都是我媽精心準備的——那隻感性的狗把頭靠在我的腳上。最近我話不多。我爸拿著雙筒望遠鏡，盯著窗外餵鳥器上的蜂鳥看得出神。", "「看那隻蜂鳥在外面繞著我的餵鳥器盤旋，就在那裡吸著，」他說。", "「提醒我一下，Ruth 什麼時候要來這裡跟你們一起公路旅行？」我媽說。", "「下個月初，」我一口咬著馬鈴薯說。", "「那會很有趣。我很高興你們可以一起去。她真棒。」", "「她像我妹妹，而且她有男朋友。」", "「我沒暗示什麼！不管了，你覺得你什麼時候會開始找工作？」", "「我想你會在我開始找的時候才知道，」我怒聲回應。我們沉默地吃了一會兒。我父母很盡責地沒有問我關於分手的事，這是他們克制且尊重我界線的英勇表現。", "「對不起，」我說。「我真的很感激你們倆。我知道我需要找份工作，自己有個住處。」我停頓。「我想我只是在哀悼。」", "我爸放下望遠鏡。", "我媽把手放在我手上。「那很有道理，」她說。我感覺自己快要哭了。", "我爸瞪大眼睛。他小心翼翼地說：「哀──喪。喔。哀悼。那個──抱歉，幫我解釋一下。你知道我的。我反應慢。沒你那麼會用詞。」", "「沒關係，」我說。「說吧。你可以問我。」", "他看起來很擔心。", "「我好像錯過了什麼。誰死了？」"]}, {"type": "section", "title": "莫札特的寓言", "paragraphs": ["在車道上抽著大麻卷，手機喇叭把《木星交響曲》放到最低音量，我在第三樂章裡聽到類似笑聲的東西。那是不可思議的聲音——起泡般、絕望的快樂，幾乎難以分辨是憤怒。對街的鄰居把窗戶猛地關上。", "當莫札特穿過一片黑暗的林子時，唯一能絆倒他的樹根是方形的。", "我第一次在看《The Sopranos》。我讀到一位文學評論家的懷疑觀點：這齣劇只是問一個社會病態者能否成為好人。那是出於對此媒介的厭惡而做的不誠實解讀。毫無趣味。《The Sopranos》不是在談那個。", "它在談你死後——不是你，而是剩下的世界——會發生什麼事：它會繼續運轉。而且說服力十足。", "我今晚發現自己下意識、無意識地在掐脈搏。"]}, {"type": "section", "title": "夢，6/15", "paragraphs": ["「有時候我就拿著培養皿坐著，等上一個禮拜。」", "在一次演講中，總統說：「你們看到的、你們讀到的，並不是正在發生的事。」群眾興奮起來。我們在新聞上看到重播。", "「我們現在根本不是在過民主了，」媽媽嘆氣著，轉台。", "「有時候我覺得他想要被暗殺，」爸爸低聲說，湯匙在冰淇淋碗裡叩答作響。「如果我的兒子像他那樣，我知道我會想要。媽媽和我在這方面很幸運。我們珍惜自己的生活。我們很高興能和你共度這段時光。我們絕不想被暗殺。」", "「永遠別說永遠，」媽媽說。「但我們確實愛你。」", "「比你所能想像的還要多。」", "我丟給他們一塊骨頭，微微一笑。他們本可以少做一點，但他們在努力。", "我媽媽選定了一位同代中非常有錢、非常有名的喜劇演員的新單口喜劇專場。這位喜劇演員在談他多麼喜歡棒球——儘管仔細想想，棒球場的食物並不好吃。根本一點也不好吃。我父母兩個激動得不得了。", "「那是真的！」我爸爸紅著臉說，擦著眼角的淚水。「那就是事實！」", "我顯然需要開始找工作了。打開了 LinkedIn，一個它的創辦人應該在海牙受審的網站。Midtown 一家有歷史的猶太藝術與社區中心刊登了一個文案工作。它不需要求職信，所以我就應徵了。", "隔天，我震驚地收到一封電子郵件，邀請我來面試。", "「當然，」我在面試時說，穿著一件淺藍色襯衫和今天早上在地鐵站出來時買的新灰色西裝外套，因為我的舊外套和露西還在舊公寓裡，「我偏好的寫作方式是合作式的。」我沒有提到我即將離城幾週。", "「那很好，」面試官說，「因為這個職位，合作是必要的。」", "記得撒旦無所不在是很重要的。像詩一樣，他可以在任何時間以任何形式出現，這也是為什麼詩人對他著迷的原因。每當我看向海洋時，很難不想起在《失樂園》中，撒旦最初來到地球時並非以蛇的形像出現，而是以一隻鸕鷀的樣子——就像現在坐在布魯克林大橋下、用那油亮的小翅膀張開著、詭異地盯著我看的那隻，正當我寫這段時。", "在郊區待了幾個星期後，布魯克林從未看起來如此美麗。我不想搭火車回去，就算只是回去過夜也不想——我有一半的念頭乾脆寫張支票，把今天我和威爾看的第一間公寓的地板當床睡下。港口吹來強風，他拍著頭想把那頂髒兮兮的白色棒球帽按穩，帽子上用鮮紅字體寫著SAPPHO，差點被吹走。他喝了一大口咖啡，拍我的背。「準備好去找下一個可以歇腳的破地方了嗎？」", "一排金蓮花的花朵彈過一隻老鼠的肚皮，老鼠穿過城市園藝師的傑作飛奔而過。細霧在東河上方瀰漫。", "我想某個時候撒旦也會以細霧的形態出現。", "我和威爾跟大樓的管理員進入一間小小的街邊公寓。整個客廳和廚房的地板上布滿了如紙屑般的小死蟑螂。", "「這地方不錯，」管理員說。他敲了敲金屬門。「能擋子彈。」", "「我喜歡格局和採光，」我說，不想和這個人撕破臉。", "「這棟樓好像有蟑螂的問題？」威爾說。一方面，威爾來是要為我說話，但另一方面，他的利害關係比較少。", "「你是什麼意思？」管理員說。", "「地板上到處都是蟑螂，」威爾說。", "屋主怒視著我們。「在哪裡？給我指出來。」", "「我沒看到，」我說。", "「這裡，例如。」威爾指著地面。「這裡。這裡。這裡。這裡。整個廚房到處都是。」", "「喔！好吧。」大樓管理員突然大笑起來，然後恢復一副公事公辦的模樣。「那些都已經死了。」", "「我在等一份工作回覆，」我說。「我可以考慮一下再告訴你嗎？」", "「我不會等的，」大樓管理員說。「這地方很搶手。過去六個月有三個人來看過。」", "回到家已經很晚，但天色尚未全黑。我在通勤火車站走回家，四周籠罩在暮藍的光線——一年中白晝最長的一天。我經過一棟掛著 AK-47 剪影旗幟的房子。一對情侶坐在阿迪朗達克椅子上，享受著一片修剪得無可挑剔的草坪，那草坪跟鄰里其他每一處都一樣，周圍都是寬敞的房子，廚櫃裡一罐又一罐的有機卡拉馬塔橄欖和一箱又一箱的 Kashi GoLean Crunch。他們手裡端著大而有露珠的白酒杯。"]}, {"type": "section", "title": "愚人的寓言", "paragraphs": ["「然而有些地方，」伯爵夫人反駁道，「關於環繞他眼睛的那圈粉紅皮膚，關於他嗅聞大地並舔那有蹄的腳——你不這樣認為嗎？那真有一種< i>貴族氣 。但說到底，誰又能說得清一個人是誰？這是個謎。」幾秒鐘過去。她搧了搧自己。", "「這是個謎，」她又說。", "讓我們之間有商業往來吧。", "如果詩歌是一種投票——為你想要的世界投票呢？我在郊區的票：紅雀、學校後方的小溪、爬上停車標誌的蜘蛛、一輛燃燒的警車、寫在蕨葉上的露珠小字母表。我在城市的票：椋鳥、火車、一輛燃燒的警車、在牆裡穿行的老鼠。", "兩年前，當總統在普選中落敗但在選舉中獲勝時，我們許多人對這個異常現象抱以苦澀的安慰。在像我們這樣的民主制度中，我們告訴自己——因為民主本就正常會有些混亂——普選偶爾會導致少數人掌權一小段時間。而正因為少數人執政是個異常情況，一個處於少數人執政下的民主制度也不能讓多數人蒙羞，總統本人更無法反映出那些反對他的人不好。我們的民主：正常。總統：不正常。", "兒童與父母分別關在不同監獄：不正常。全家一起被關在同一屋簷下的監獄：還談不上完全正常，但肯定比不正常要好。"]}, {"type": "section", "title": "夢，6/28", "paragraphs": ["和有同理心的狗一起，靠著一塊機械或漂流木游回岸邊，就像《大白鯊》的結尾。我用理查·德雷福斯的聲音對牠說：「沒錯，你這漂亮的混蛋，我們做到了，」牠在我旁邊划水，露出笑容但看起來很累。"]}, {"type": "section", "title": "壁蝨的寓言", "paragraphs": ["今晚我在狗的眼皮上看到一個看起來像壁蝨的東西。我從浴室拿了把鑷子，跪下要把它拔掉。他斜眼看我，但祥和地躺著耐心等待。我撫平他頭上細軟的黃毛，把鑷子對準那東西，然後夾下去。但那不是壁蝨——只是他眼睛上方一個小小的黑色贅生物。鮮血順著牠的鼻子流下，他卻沒有一絲抽動。我倒吸一口氣。他向前伸身舔我的手，像是在原諒我傷害了他，血沾在牠的毛上。我突然哭了起來。", "愛就是地獄。"]}, {"type": "section", "title": "AJ·索普拉諾的寓言", "paragraphs": ["在把一塊煤渣磚綁在腳上並把自己丟進家裡的泳池——也就是或許整個系列中最令人心碎的一幕的前奏——未遂自殺未成功之後，AJ 仍然以接近神性般的執著，徹頭徹尾是個混蛋。", "掛在走廊桌上那面雕花手鏡上的蒼蠅——翅膀貼在玻璃上，腿朝天，倒吊在自己的倒影上——是在睡覺，還是壞掉了？"]}], "ch14": [{"type": "chapter", "title": "七月", "paragraphs": []}, {"type": "section", "title": "廢墟的寓言", "paragraphs": ["「或許我們到阿肯色時可以去水晶橋美術館。我一直想去看看。據說他們的常設收藏很了不起。」", "「我討厭博物館，」我嘆道。「『常設收藏』到底是什麼意思？沒有什麼是永恆的。」", "我們在科尼島木板道上的長椅上看夕陽。美麗的夜晚，空氣潮溼又誘人，身後的奇觀摩天輪緩緩轉動，四周擠滿大笑的青少年和家庭，海洋像一大片無邊的玻璃攤開在眼前，而我散發出一種糟糕的情緒，像熱浪一樣。車子已經打包好準備出發。我們先開車來到這裡，抵達洛杉磯後會直接駛向海邊——從這一岸到那一岸。這是露斯的主意。她說，在動盪時期，儀式很重要。", "「你並不討厭博物館，」她說，試圖對即將在未來幾週裡與她在封閉空間相處甚多的人，溫和地調整情緒。", "「我討厭！」她回道。", "「抱歉，但你不討厭。你是個詩人。如果你討厭博物館，你喜歡什麼？」", "一道淡淡的玫瑰色陽光從雲間反射，斑駁地灑在露絲平靜的臉上，她等我回答。天空開始呈現發光的紫色。嘉年華的燈光亮起。我低聲說。", "「我喜歡廢墟。」", "她點點頭。「他媽的閉嘴，快去上車。」", "我們的公路旅行會經過巴爾的摩、聖路易斯，穿過阿肯色州的奧沙克山脈，從德州平原出來，橫越西南部，然後進入洛杉磯。我已經把帳篷打包好，到了阿肯色我們會露營，至少住幾晚。", "當詩人的一個好處是你幾乎能在任何地方舉辦朗誦會。人們喜歡詩這個概念——唯一的問題是大多數人其實並不想讀或聽它。這並不是個大問題。你不會拿到一毛錢酬勞，也沒人會聽你講的一字一句，但這是一個很好的出遊藉口，而且你可以把所有花費當作工作開銷報稅。我們只在前兩站做朗誦——所以如果有人被查稅，我們可以說這是在巡迴。任何東西做兩次就會形成一個模式。", "「現在你解脫了，第一件想做的事是什麼？」在下去巴爾的路上，露絲問。", "「我想我已經在做了。我喜歡開車好幾個小時，在路上放空。對我來說那像是冥想。」", "「你其實可以真正去冥想，知道嗎。」", "「我比較喜歡把碳排放從這台速霸陸丟到全國各地。分手後才開始練冥想、培養那種人的個性，似乎是種更複雜的污染空氣方式。你在洛杉磯有在冥想嗎？」", "「不，我只是他媽的在瘋狂做愛。」", "「所以你跟切斯特的事進展得不錯？」", "「我覺得我那些高潮好像讓我的皮膚變好了，」她說著，用手機當鏡子。「但我其實不知道那是否跟切斯特有關——只是我人生中的一個階段。也許跟收養霍默有關——我們發現他的時候看起來好虛弱，現在卻很好。我也說不上來。我對命運感到一種奇怪的平靜。」", "「你喜歡他的音樂嗎？」", "她咀嚼了很久，那肯定是一塊極為乾硬的牛肉乾。", "「是的，」她說，吞下去。", "我們在午夜抵達巴爾的摩。", "巴爾的摩有一種很棒的嘔吐文化。早餐後在港邊散步時，露絲就在大白天直接向水裡嘔吐，上午晚些時候陽光下大家都若無其事地從她身邊走過。他們似乎已經習慣這種事。這是一個可以做自己的地方。", "「我想我吃太多牛肉乾了，」露絲邊吐邊說。", "在水族館逛了一天又逛書店之後，我們在一家幾乎空無一人的咖啡館裡辦讀書會，咖啡師正在收拾。只有一個人進來，但也無所謂。我的朗讀還好。露絲一如往常，表現出色。", "「剛剛妳表現很好，」那位唯一的聽眾對露絲說，完全沒理我。「妳念研究所嗎？」", "「我在洛杉磯念博士，但念的是英文，不是創意寫作——」", "「我在霍普金斯。你的詩技巧很嫻熟。我確實喜歡其中一些。你顯然是一位真正的作家。但你還沒完全發揮出你的能力。我覺得如果你去觸及最重要的主題，詩會更有共鳴。」", "「有意思！」露絲亮亮地說，充滿厭惡。「告訴我——哪些是最重要的主題？」", "「戰爭和生態。你有沒有用車撞死過鹿或人？人類是強大的生物——強大得近乎可怕——但那種力量，是要付出代價的。類似那樣的事情。那類性質的事。祝你有個愉快的夜晚。」", "他離開了。"]}, {"type": "section", "title": "寓言之歌", "paragraphs": ["「有意思的歌。你一定是學術界的人吧。你在哪教書？」", "「非常感謝。我是垃圾學院（Garbage College）隱秘生物音樂學系（Cryptobiomusicology Department）的助理教授。」", "在聖路易斯，我們在地下室演出間隙閱讀，主題曲是一支名為 Glass Cornhole 的數學搖滾樂團。有人一個人在旁邊聽我們讀書，其他人則都擠到後面去買啤酒。", "我結束表演後直接從麥克風走到啤酒隊伍。他跟了上來。「幹得好，」他恭喜我。", "「謝啦，兄弟。謝謝你來。那麼──聖路易的詩歌圈是怎麼樣的？」他的表情變了。我立刻知道我說錯話了。", "「其實我不會去劃那種界線，詩是什麼、不算詩是什麼，」他說。「我不太覺得那應該由我來定義？我是誰，能說一首詩是什麼，更別說是一個『圈子』。你是說這個對話不是一個『詩歌圈』嗎？每一刻豈不是都是一首詩？」", "他帶著懷疑考慮著這點。Glass Cornhole 的吉他手開始用一把毛絨槌敲打她的樂器，反饋聲以震碎耳膜的多節奏浪潮充滿了地下室。像羽管鍵琴與鋸齒音雙重奏的合成器發出持續不斷的音色，貝斯衝出一段與悲鳴吉他同步的急奔，鼓手則開始以原始而優雅的編織節奏猛擊大鼓和小鼓。", "「這樂團他媽的太不可思議了，」我大喊。", "「聽著，我不會評頭論足，兄弟，」他在音樂中大喊。「就我個人？我覺得在任何情況下劃出界線、任何界線，把一件事和另一件事分開，有點像監禁式的想法。」", "眼睛投給州長，被畫在密蘇里南部一間房子的籬笆上，旁邊是一面邦聯旗和一個 MAGA 標誌。", "沒有人能住到自己想住的汽車旅館，但每個人都能住到自己應得的汽車旅館。橫跨半個國家，我們倆都很煩躁。露絲每天都在嘔吐，還把罪魁怪到我的開車上。我的車發出一種令人不安的高頻研磨聲，我不想處理，因為我這趟旅程已經在血本無歸。任何人都不被允許談論這些事。", "「你有沒有收到上個月面試的消息？」露絲說，從加油站廁所出來，臉色蒼白。", "「沒有，一點回音都沒有。你要不要去藥局看看？」", "「你要不要把這車帶去給機械師檢查？」", "「那聲音對速霸陸來說很正常。引擎怠速會顫抖。我想我了解自己的車。」", "「我想我了解自己的身體。」", "我們沉默地繼續開車。", "俗話說，最好的良藥是忠告。"]}, {"type": "section", "title": "水晶橋的寓言", "paragraphs": ["聲音與這裡的環境如此不協調，我一時間以為是自己聽錯——但當那股氣味襲來，我從畫前轉身，感覺臉上的血色全部褪去。突然我的左眼視力強烈地消失了，不得不坐下。我深吸了好幾口氣，努力不讓自己慌張。博物館的遊客在我周圍走動，顏色的潮汐又慢慢退回來——但退得太慢了。", "如果你需要「消化」藝術，那麼你也可能被風景噎住；如果偶然需要一場「手術」，那就不是偶然了。"]}, {"type": "section", "title": "瓊·米契爾的寓言", "paragraphs": ["藍色籠、青綠籠、綠色籠、赭色籠、湖水藍籠、黃色籠、芥末籠、酒紅籠、紅色籠、玫瑰籠、洋紅籠、鉑金籠、炭灰籠、萊姆綠籠、深褐紅籠、粉紅籠、淡紫籠、夕陽籠、帆船籠、土壤籠、鮭魚籠、結節籠、凝塊籠、燒褐籠、鏽色籠、奶黃籠、蝸牛殼籠、滴落籠、草籠、押韻籠、斜線籠、蠕蟲籠、圓圈籠、點點籠、透明籠、鉻色籠、郵件籠、空氣籠。", "奧沙克山脈：連綿起伏的群山與鋸齒狀的懸崖，被落下的水簾與藤蔓覆蓋，偶爾被嚎叫的掠食者與急促的鳴叫聲轟炸。這是一片無人居住、樹木茂密的景觀。這景象與我以往所見全然不同。自從巴爾的摩以來，我第一次注意到自己感到快樂。藏在昏暗松林裡的一隻鳥兒叫喊著：「披薩！薰衣草，薰衣草披薩！」", "「我討厭鳥類，」露絲嘆氣，凝望著我們營火邊的樹林。", "「你並不討厭鳥類，」我糾正道。", "「我討厭。我對牠們沒興趣。」", "「你是詩人。既然你討厭鳥，你會喜歡什麼？」", "露絲思考了片刻。木柴噼啪作響。昆蟲在我們周圍嗡嗡作響。", "「我對趨勢有興趣。」", "「如果你細想，鳥就是演化的趨勢。」", "「我要進帳篷去睡覺。」", "對趨勢有興趣。感興趣？不，我們熱愛它們。每一塊，在世界精美石造物的無數裂隙中生長的地衣斑塊，每一個巢裡的斑點蛋，無論它們屹立了多少時代。", "清晨，在露絲嘔吐之後，我們徒步前往一處當地有名的洞穴，一個有天窗且水無休止傾瀉的洞穴，叫作「榮耀洞瀑布」——這座瀑布的真實名稱，取自上帝的榮耀。光透過涓涓細流傾瀉而下，為洞穴灑上柔和的光芒。我的膝蓋疼，但景色如此美麗以至於我幾乎沒有察覺。我轉向露絲。她正靜靜地哭泣。", "「怎麼了？」我說。", "「只是」——她用袖子抹了抹臉，指著落下的水說——「看那麼多資訊。」"]}, {"type": "section", "title": "善良膝蓋的寓言", "paragraphs": ["他那隻壞膝蓋一直痛。但他那隻好膝蓋感覺就像根本沒有膝蓋一樣。", "我在離開阿肯色州去加油時心想：汽油，最後的地景藝術。", "我們飛快地越過俄克拉荷馬州的「死女人鎮」。「你覺得這鎮名是怎麼來的？」我說。", "「好問題，」露絲說。「我查查。」她看了她的手機。「你一定不會相信，說這鎮裡確實有個女人死了。」", "「是自然死亡嗎？」", "「她被殺了。上面寫這案子還沒破。」她盯著窗外。我們沉默地繼續前行了一會兒。", "“聽著，我很抱歉我最近的行為，”她終於說。「我知道你正經歷一段艱難的時期。我想做個好朋友。我只是很害怕。我可能和 Chester 漏了一天或兩天沒吃避孕藥。」", "「我很抱歉幾天前說我們應該去藥局。那不該我管的事。」", "「我們去 Amarillo 找一家吧，」她說。車蓋下傳出持續的尖銳聲，通風口隱約飄來一股金屬味。「說真的，你不擔心你的車嗎？」", "「我跟你說過了，Subaru 的引擎怠速時會抖。那聲音是正常的。」", "遠方，一簇細長的閃電從雷雲中躍出，劃向一座從地平線拔地而起的巨大十字架，雨點傾瀉，打在我們溫熱如繭的情緒上。然後，在阿馬里洛以東五十英里處，就在格魯姆城外——鎮名確是這樣，得名於一位叫 B. B. Groom 的牧場主，但如露絲正跟我說的，更為人所知的是那座高達兩百英尺的十字架——我的車發出可怕的震顫，然後在一陣驟雨如簾掃過時熄火了。", "在幾乎如聖經般滂沱的大雨中，路邊的機械師告訴我，引擎聞起來像是金屬互相磨擦的味道。", "「那是什麼意思？」我全身濕透地問。", "我對那件事也沒什麼好說的。出發前那些日子我一直在仔細籌劃我們的兩場詩歌朗誦——寫了整整三封電子郵件，寄出了其中兩封。要去換機油以便開三千英里這事我根本沒想到。露絲頭髮黏在臉上，她看著地面搖搖頭。", "「他們乾脆應該叫它死人機場就好，」她說。「死了的〈太空人〉機場。」", "「謝謝你載我開半個國家來。對不起，我把我們的車搞壞了。」", "「你的車，」她更正道。「一切都被原諒了。對不起我沒能和你一起在阿馬里洛熬過這段。我可能需要看醫生。」", "「別擔心我。你尿完再驗完再打給我。愛你。」", "「知道你哪天會到洛杉磯再打給我。請注意安全。」", "我們在出發大廳前擁抱了彼此。然後我又上了拖車，直接開往布朗速霸陸——我才知道那名字來自阿馬里洛所有食物的顏色。有人告訴我毀壞引擎的零件十天後才會到貨。這要花我近五千美元。", "富有榮譽卻沒有常識。富有常識卻沒有羞恥。富有羞恥卻沒有蛆蟲。", "不。富有羞恥，而且沒有蛆蟲。直到蛆蟲吞噬這位命運之夫？他的名字是理查德。但他的朋友們叫他瑞克。", "阿馬里洛正遭受一波熱浪的襲擊，這無疑是有人或某物試圖把我們從地球抹去的徵兆。我住在鎮上最便宜、最可怕的汽車旅館，巧合或不巧合地，步行範圍內就有布朗速霸陸。我在手機上查看我的存款。引擎修好之後，大約只會剩下兩千五百美元。我坐在一張吱吱作響的床邊，置身於一個極冷的冷氣方盒裡，努力不動。如果我跌倒摔斷骨頭，有人為我打電話叫救護車，那我完蛋了。", "沒有露絲在身邊，時間顯得詭異——時間不是那麼流逝，倒像是從時鐘上被抹去。一種不存在的狀態，像死亡一樣——去睡那個大地長眠。", "「嘿，夥計們——你們要往哪裡去？」", "「我要把這引擎修好，然後我要去睡我的長眠。」", "在汽車旅館的地板或牆壁上跟著雷射點走，顯然只有貓或笨蛋會做。但我想我們可以同意，在夕陽下穿過翠綠的森林或有鳥鳴的草原跟著它走，說實話，聽起來非常刺激。", "露絲傳給我一張驗孕棒的照片：||", "「你打算怎麼辦？」我在電話裡問她。", "「我不知道。我在試著從自己裡找到答案。」", "「你跟切斯特說了嗎？」", "「還沒。我只跟你——還有霍默說過。露西和我今天晚點會聊。威爾和我約好明天通電話。他們都很擔心，你知道的。我跟他們說你很有辦法，雖然你是個笨蛋。」", "「謝謝你處理那些詢問。」威爾傳訊給我。露西沒有。", "「我不知道該怎麼辦，」她嘆氣。「我從沒想過會遇到這種情況。」", "「我們是猶太人，露絲。我們不會為這個緊張。我曾曾祖母要是在星期六被拔牙，肯定比在星期日墮胎還要反對。直接從診所外那些舉標語的可怕男怨者身旁走過，直視他們那雙漆黑的小眼睛，然後說，『安息日安好，操你們—』」", "「根本不是那回事，」她怒斥。「這關乎我想要的生活模樣。」", "「我一直以為到了這種時刻，答案會很明顯，」她接著說。「好像人生會替我做決定。但事情不是那樣──如果你幸運的話，什麼都不是。對我來說，沒有什麼好或壞的決定──直到我已經做了選擇並看到它的結果才知道。可怕的是，為了弄清哪一個是對的，我必須去選擇。」"]}, {"type": "section", "title": "新芽林寓言", "paragraphs": ["我坐在車行裡讀普魯斯特《追憶似水年華》的第二卷《在新芽林中》，那裡的咖啡難喝但免費。我每天花數小時讀幾頁，走到車庫來回踱步，尋找我的車子的蹤影，然後再讀幾頁。沒有人跟我說話。幾天後，一個機械師走過來問我從哪裡來。當我告訴他我來自紐約時，他說到處都有好人，並且舉例說他知道現在紐約比八○年代「有那麼多犯罪」的時候要好得多。", "幾天後的清晨，又有另一位機械師來找我，告訴我零件終於到了。我的車幾小時內就能修好。他對進展抱持謹慎的樂觀，語氣像一陣涼爽的海風。我極力向他道謝。又過了一兩個小時。我把《Within a Budding Grove》打開到最後幾頁。", "最後一句寫道：「當弗朗索瓦斯把窗框頂端的針拔下，取下布幔，拉開窗簾時，她所揭示的夏日彷彿已死，既古老又豪華，就像一具千年富麗的木乃伊，而我們的老僕人不過小心地解開了亞麻裹布，才連同那金色衣裳一同展示出它被防腐保存的身軀。」", "我讀到這些字，脊椎上端湧起一股柔和的電流，沿著四肢流散出去。當我從書頁抬起頭時，第二位機械師在我面前出現。他說我的 Forester 的報廢引擎已經換好，還免費替我裝了一條新的正時皮帶。", "我以每小時九十英里的速度穿越德州泛哈德平原、新墨西哥和亞利桑那。我從未感到如此興奮或如此孤獨，電藍色的穹頂拱起，覆蓋著一片似乎無垠的紅色空隙。", "在亞利桑那州西部，經歷了像是好幾天的時間後，太陽終於下山。加州近在咫尺，幾乎就在邊界，我疲憊到幾乎看不清楚。我從州際公路下交流道，轉了三個彎進入一條廢棄的土路，然後靠邊停車。我可以在這裡閉目休息一兩個小時，黎明前醒來，繼續上路。我在一片茫茫星網下攤開睡袋，平躺在車旁的一片空地上，整個宇宙簡化為三種屬性：黑暗、光亮與時間。遠處有郊狼的笑聲。七年在這裡算不了什麼。它從我身上滲出，溢進這個能夠承接的地方。", "我醒來時，一個男人站在我上方，手裡握著一支步槍。看來我睡過頭了。太陽正炙熱地掛在地平線上方。睡袋外的溫度肯定快要一百華氏度了；睡袋裡頭則像地獄一樣，汗水濕透了。", "「我不知道紐約怎麼樣，但亞利桑那是個可正當防衛的州，這是我的地盤。車裡有什麼？你是做什麼工作的？」", "我此生最重要的問題。我立刻回答，沒多想。", "「大部分都，」我結結巴巴地說，「都不押韻。」", "雖然我驚恐地意識到自己居然會說出這句話，但更可怕的是接下來會發生什麼。", "「可是最近很多都會押韻。」", "「你說什麼？我不知道你在吞什麼藥，但把你的東西收一收，滾出我的地盤。」", "我很渴望。當那輛速霸陸揚起塵土、朝加州駛去時，我查看手機。剛過九點。有一通來自紐約號碼、在一個小時前留下的語音信箱。", "「早安，D__，」一個乾脆的聲音說。「我是打來跟您談面試的。我們對您印象深刻，也很享受與您交談。我們想要聘請您，起始日期為八月一日，星期三。請回電給我們。」", "我查看手機。星期五，七月二十七日。", "我打電話給那位住著但沒有蟑螂公寓的大樓管理員，告訴他我可以在月初親自過去繳交押金。", "我打電話給露絲，告訴她我要回紐約了。", "我把車調頭。", "一秒一秒地被時間這個鈍器敲擊在頭顱上。", "州際公路上方垂直的雲朵緩緩移動，像帆片般捕捉光線。", "被鎖在鐘點之外，陽光在他快活的臉上留下靴印。", "他們表面的每一光年都被空無塗抹，只有一抺灼熱的亮點散落其間：天蠍、天鵝與大熊在各自軌道中漂流，將無聲的閒話灑落在他的皮膚上。"]}], "ch15": [{"type": "chapter", "title": "八月", "paragraphs": ["第一天上新工作。我的資深內容調整員帶我四處看看。我微笑，努力表現得很能幹，堅定地握手，祈禱新襯衫不會透出汗漬，然後被留給自己的工作。", "新辦公室不是開放式格局，而是老式的隔間。就緊挨我左邊隔間裡的那個男人拿起辦公室座機，撥了四個號碼。我右邊的電話正好響了。", "「喂？」右邊的同事說。", "「嘿，」左邊的同事說。「你有口香糖嗎？」", "想像一下，經過數十億年的時光，蟬那有節奏地喀喀作響的歌聲拼湊成了一整句話，一個被錄在超越歷史的音檔上的問題；當把這段錄音加速到只剩五秒鐘時，牠們歌聲的總和——記錄在一段期間內，帝國興衰、偉大交響曲的創作、被讚頌又被遺忘，以及生與死、歡笑與哀傷同樣豐沛——只剩下這個詢問：", "D    O    Y    O    U    H    A    V    E    A    N    Y    G    U    M    ?", "在The Guermantes Way中，我們的敘述者馬賽爾告訴我們，他祖母的真實自我首次在電話裡顯現——之所以稱為真實，是因為她只是聲音，沒有禮節那層盔甲作為掩飾。", "如果說電話把我們還原成聲音的本質，電子郵件則讓我們變得額外。", "辦公室廁所的標語上寫著：不要在這個馬桶裡放任何東西。", "我理髮時把福斯新聞靜音了。關閉字幕顯示總統正在狂轟記者為何是人民的公敵，但我更在意的是他皮膚的質地，那層皺皺的濕漉似靈質膜，迅速變得像我神經系統熟悉的某物──就像我記得祖父浴室的發霉浴簾般親切。它與站在他旁邊、被擦亮得像雪花石膏般光滑的女婿形成鮮明對比。那女婿像個木偶師的延長私生子兼夜行蠕蟲，沉默是他最出色的表演，幾乎成了他的身體一部分，是他最強大的肌肉，一種看他那玻璃般的眼睛越久似乎就能穿越時空向後傳遞的力量。我想知道他是否親自透過螢幕把理髮店的電視給靜音了。普魯斯特式的人物。", "「為猶太人的不幸而感傷，回憶他與基督徒的友誼，隨著時間推移變得越來越做作與矯揉，原因將在適當時候揭示，他如今看起來像一隻被不檢點地嫁接上毛髮的前拉斐爾派蠕蟲，像在蛋白石深處的線。」（Proust，The Guermantes Way）", "理髮師把剃刀上的泡沫最後擦乾，拍了拍我的後頸，說：「現在你回學校去吧。」", "我把箱子裡的書和二手家具搬進公寓，清掃乾淨了蟑螂屍體。熱得幾乎難以忍受。", "我攤開地毯，發現兩根長貓鬚。我把它們放進一個小罐子。然後我組好新床，開著風扇，閉上眼睛，睡得比這幾個月以來都更沉。", "隔天早上我獨自騎車到科尼島。兩個男孩在木板路上打鬧，大概十二歲，從彼此口袋裡互相抽著一支 Juul，腳下傳來一塊滑板，剪裁過的短袖和破洞牛仔褲，互相揮拳、笑著，嘴唇之間夾著小圓帽當作一道牆，還互吻。巨大的奶油色雲朵在驚奇摩天輪後方的沙灘上飄著。一群黑頭海鷗像拖網一樣盤旋在一把掌印陽傘上，凝滯在空中。我自從和露絲開始公路旅行後就沒來過這裡。不知是某個夏天了。", "「你覺得怎麼樣？」我在電話裡問她。", "「很糟，」她說。「我一直都覺得噁心。」", "「你決定要怎麼做了嗎？」", "「嗯——有點瘋狂。我前幾天去診所約好了。跟切斯特說我要自己去。這是我必須親自面對的事。我以為會有手拿大聲公的豬頭在外面對女人吼叫，果然有。但當我到了——切斯特竟然帶了一整套擴大器和迴圈踏板，用他車上的電池接著。他在他們旁邊放超低頻單簧管。他們根本聽不見。」", "「我的天哪，」我說。", "「我知道——氣死人了！他公然違抗我。」她沉默了一會兒。「但同時——那種場面又有點浪漫。等我到了候診室，我就是不想去做了。」", "我說不出話來。", "「我離開的時候把幾乎整瓶康普茶都朝那些混蛋潑了。不能讓 Chester 贏過我。不管怎樣，預產期看起來是白羊座——跟你一樣。所以不管這小孩是誰，他們會喜歡成為注意的焦點。」", "早晨地鐵上的星座報告：「去你媽的天秤，我會揍一個天秤混蛋。去你媽的獅子，去你媽的處女，還有去你媽的川普。但歐巴馬也他媽的爛。歐巴馬也開過戰爭，如果你懂歷史就知道。別擺那副臉了。」", "我去舊公寓拿幾樣東西。Lucy 開門，尷尬地抱了我一下。我們整個夏天都沒見。那地方一樣，但我們兩人的所有照片都被收起來了。", "「你最近好嗎？」我說。", "「我沒事。」貓兒們呼嚕著，把臉蹭到她的腳踝上。牠們似乎不記得我。「你有沒有聽到露絲的消息？」", "「有啊。她前幾天跟我說過。」", "沉默。", "「不管怎樣，」我繼續說，「我應該把東西拿一拿。」", "「我聽說你找到工作了，」露西說。「恭喜你。我為你感到驕傲。希望你在那裡會比較快樂。」", "「謝謝你讓我來。見到你真好，露西。」", "「等一下！」她說，我正要離開。「你把西裝外套忘了。」她從衣櫃拿出來，搭在我肩上，捏了捏我的手臂，然後把門鎖上。", "「在護送帕爾馬公主上馬車之後，德‧赫爾芒特先生拾起我的大衣，說道：『讓我幫你穿回你的皮囊。』」（普魯斯特，The Guermantes Way）"]}, {"type": "section", "title": "夢，8/17", "paragraphs": ["「這是一個價值百萬美元的問題：你是被賦予尊榮，還是僅僅被認可？」"]}, {"type": "section", "title": "改善的寓言", "paragraphs": ["我現在工作的那間藝術與社區中心不僅有游泳池，還有一個音樂廳。路過音樂廳時，我在調音時間聽見一位鋼琴家在彈貝多芬的奏鳴曲。我停下來，幾分鐘內讓自己沉浸在琴鍵那悵然流淌的哀愁中。", "在鋼琴師頭頂之上，越過那天花板──以十九世紀末仿木紋風格精心裝飾的天花板──年長的紐約人正游他們的午後圈數。我想像著奏鳴曲的音符在空中振動，穿過建築與高度氯化的水，輕輕敲擊他們的皮膚，當他們在泳道中上下拍水時。", "我決定報名參加公司作為福利提供的免費健身房會籍。我的資深內容調整員在簽表格時對我微笑。", "「如果在這裡工作不能改善你的生活品質，那就有問題了，」她說。「我很高興你會好好利用這個。好好享受吧。」", "我從沒想過工作竟然能改善生活。我一直認為勞動與愉悅完全不同步，是我們為了薪水而做的事，用以延緩死亡。", "「那些老百老匯的音樂劇真是棒極了，」其中一人說，聲音像兩道細沙在半空中互相篩落融合一般，「像《Guys and Dolls》和《Smokey Joe’s Café》這種的。但有些新的音樂劇會讓人恨不得去死。」", "另一個在經過我時轉向我，看到我慌忙用毛巾遮掩，誇張地翻了個白眼。", "他又轉回對朋友說：「我們這把年紀別把時間浪費在新音樂劇上。」", "今天，我母校的文學期刊刊登了我一首名為「Dumpster」的詩，並邀請我十月回校朗讀。", "下雨的時候，就是傾盆大落。"]}, {"type": "section", "title": "夢，8/29", "paragraphs": ["濃煙從我打開的筆電冒出，螢幕那種鎂白色的光幾乎被遮蔽。醒來時，太陽在地平線上方正炙紅燃燒，炙熱的映光在水面上劃出一道切割般的光線。", "我眨眼。 大海也眨了眨眼。"]}], "ch16": [{"type": "chapter", "title": "九月", "paragraphs": ["在我舊的工作，我撰寫物品的描述。在我新的工作，我撰寫演講、音樂會、猶太生活課程與節慶禮拜，以及其他活動的描述。", "曾經我從事的是販售物品的工作。現在我從事的是販售時間的工作。", "但我該如何利用那些我不出售的時間？", "我翻閱我的筆記本。", "我媽媽傳簡訊提醒我記得祝我的大伯伊西多爾生日快樂。他剛滿一百歲。"]}, {"type": "section", "title": "伊西多爾大伯的寓言", "paragraphs": ["2018年9月2日 下午1:13", "親愛的伊西多爾大伯，", "只是想跟你簡短說聲生日快樂——一百歲真是個重要的里程碑！希望你一切安好，也期待我們能很快再見面。", "滿滿的愛，", "D__", "2018年9月3日 下午1:26", "親愛的 D__：謝謝你的問候。我剛讀了你那首「Dumpster」的詩。恭喜。我將學著如何解讀你那種風格的詩。在我住家對街，最近有一個垃圾集裝箱，所有的家具、打掃用具、燈具、工具、書籍，都被丟進去。我很認識那些鄰居。雖然這些碎屑以前從未彼此緊密相連，但現在卻是。仔細檢視，就像人類學家一樣，它們揭示了一整套生活型態。", "不知為何，我一直對詩感興趣。事實上，我從高中畢業後唯一留著的一本書就是《The Golden Treasury》，一本英國古典詩選。所以，遲早我那長輩輩分的某位親戚會成為詩人也只是時間問題。向上吧！（Excelsior!）", "愛你的，Isidore", "2018年9月4日，上午11:31", "親愛的 Isidore，", "非常感謝你的來信。我很高興你讀了那首詩。我一直在想我們家裡是否有隱性詩歌基因——我記得在爺爺的追思會上看到你在讀 Keats，那也是我的最愛之一。", "順帶一提——我想跟你商量一件事。最近我一直在做一種剪貼簿，風格跟 Keats、或「Dumpster」、或其實我以前寫過的任何東西都非常不同，裡面包含（除了其他東西）一些無意中聽到的對話片段和大量我自己並未創作的蒐集語句。我在想你對我把你之前的那封電子郵件的部分或全部放進剪貼簿中會有什麼感覺。這是一個實驗，所以可能什麼也不會成形，或者未來某天我可能會把它放進一本書裡——現在說不準。如果這讓你覺得困惑，或你寧願我不要收錄，那完全沒問題——只要說一聲我就會把它排除。告訴我你的想法。", "愛你的，", "D__", "2018年9月5日 中午12:07", "親愛的 D__: 如果你願意可以引用我的話。我剛讀了一首由 Wisława Szymborska 所寫的詩，名為「The Stagecoach」。在某種意義上，馬車就是一個人們的垃圾車，而她便從中獲得靈感。", "愛你的，Isidore", "勞動節那天在海灘，威爾和我——曬得皮膚發紅又有點平淡——帶著沉著的尊嚴默默忍受附近青少年放出的音樂，兩個人都快陶醉得不省人事。幾個肌肉異常發達的男人走過。我說：「你覺得我的胸肌應該更雕刻些嗎？」", "「不用了，老兄。你的胸膛已經是雕刻般的——一首歌的胸膛。」", "我們旁邊那個尖叫的小孩已經尖到一種亢奮的境界，無論給他多少雪酪都哄不住。", "「你覺得你會當爸爸嗎？」威爾說。", "「我無法想像勞動節那天不能拋下一切去海邊。你懂吧？我的時間——我很重視它。但我為露絲高興。她會是個很棒的媽媽。」", "「完全同意。為露絲乾杯。」我們敲了敲那罐 Narragansetts。", "「你和露絲在一起的時候有沒有談過孩子？」我說。", "「我想談，但她說她看不出能跟我一起有那種未來。」", "「該死。我不知道那件事。」", "我們各自沉默片刻，沒有說話——齒輪緩慢地轉動，天平在我們眼後微微顫動，一個披著斗篷、眼神如鋼的理性幽靈無聲地與那個已在我們腦中安家的紫色小丑霧影共舞。", "「你覺得你會很快再開始約會嗎？」他終於說，急於轉換話題。", "躺在我們旁邊浴巾上的一名男子，顯然也沒有家庭或伴侶的羈絆，正在讀一本名為Deep Work的自助書。他也在猛烈地吸電子菸，煙霧帶著人造鬆餅和糖漿的氣味從他的鼻孔裡翻騰冒出，像條龍似的。", "「我覺得我還沒準備好，」我說。", "「整隻鳥，只由一個黑點和兩條線組成，」Will 過了一會兒眯著眼望向地平線說。「你能想像嗎？」", "「我們走之前我還要再潛一下，」我說。", "我跑到水邊，跳進浪裡。我游到比衝浪者更外面一點的地方，正要回游——就在水裡，離我幾步遠踩著水的是法蒂瑪，那個我去年失去工作的同事。", "我看著她，不太確定要不要打招呼。她發現我盯著看，瞪了我一眼，起初沒有認出我。然後她搖搖頭，臉上綻出職場式的笑容。", "「天啊，嗨！」她邊游過來邊說，為了讓頭保持露出水面而抬起頭。「你怎麼樣？」", "看到她有點讓人震驚——不是因為這種偶遇本身，而是因為在海裡見到一位前同事。我們在浪中上下浮沉，頭髮都是濕的。作為同事，我們以前每天都見面，那是一種親密感——但會在同一片水域裡游泳，這點我從未想到過，直到此刻。不過我想我應該得習慣這種想法，畢竟我現在的新工作地點有個游泳池。", "她跟我說了舊公司的八卦。在大規模出走之後，她繼續當一個「過渡文案」——同時兼做客服和出貨人員。我問我們以前的老闆過得怎麼樣。", "「真的很瘋狂——我也不知道，」她說，一邊用手遮住陽光。「大約六個禮拜前他就不回我的郵件了。直接人間蒸發！我打電話去總公司，他們說他已經不在那裡上班了。只剩我一個人。」她停頓了一下。「我倒是終於買到我一直想要的那個很酷的灰色沙發。」", "「哇靠，」我說。「那——恭喜！很高興見到你。我們應該找時間好好喝一杯，好好聊聊。」", "「超讚，」她說。", "浪濤拍打在我們的肩膀上。我們都知道彼此沒有理由再相見。", "我游回岸邊。", "在辦公室裡，當我繼續被那一連串歲月在地球上用鐵錘般猛擊時，我驚訝地發現自己比起用「then」更常用到「than」——我們或許永遠無法知道單字 “appearing” 裡到底有多少個r。", "我被指派為一系列猶太青少年團體撰寫描述——部分世俗、部分虔誠，像是我和朋友小時候在我們的寺廟裡週一晚上會去參加的那種團體，父母和拉比用源源不絕的免費披薩賄賂我們。這從來不是我的興趣。但什麼也不是我的興趣。", "我閉上眼睛，試著想像父母會想聽到什麼，會願意把我報名參加這種活動。然後我試著想像我自己會想聽到什麼。我寫下：", "在 2018 年，如何才算是成為一個猶太孩子？", "不錯，我心想。還保持著。然後我把它寄給我的資深內容調整員。", "她來我桌邊。「謝謝你的描述，」她說。「我做了幾處調整。我在想，也許你應該參加我們的一些猶太生活活動，親身感受一下這裡的情況。」"]}, {"type": "section", "title": "品牌重塑的寓言", "paragraphs": ["我正與我們表演節目部的總監開會。數十年來，她於每週三策劃了一個令人印象深刻的 commedia dell’arte 系列，名為 Mimes in the Afternoon。這個系列多年來出人意料地受歡迎。但在過去十年，目標族群──觀眾與捐贈者──開始逐漸消失。Mimes in the Afternoon 正在為較年輕的群體重新命名並定位。它將改在週五晚間演出，以吸引那些無法在週中請假觀賞高規格啞劇表演的人，儘管沒有人公開承認這仍是一項徒勞的主張──並非很多對最新無聲小丑科技有興趣的年輕人會在下班後的週五晚上來中城，因為三十年來房價已把他們推得離我們這類機構越來越遠，擠進外區越來越小的公寓，薪資卻大致維持不變。這意味著重新定位需要假裝要吸引千禧世代──以安撫機構對我們文化相關性的焦慮──同時對嬰兒潮世代吹狗哨，讓他們覺得既潮又懷舊，進而購票。 這種微妙的難題正是文案撰稿人的適職。", "「《下午的默劇》是這個單位的象徵之一，」那位憤慨的程式設計師說。「它一直都在週三。一直在下午。它有效。為什麼要改變？」", "「嗯，嘗試新的視角總是好事，」我說。", "「你在這裡多久了，五分鐘？」她說。「五年後再用新的視角來跟我說。抱歉，我有點激動。這不是你的錯。」", "「別擔心。我有幾個點子。要不要叫這個影集《你有默劇演員》？」", "「不錯。不錯得很。但這沒傳達出現在是在星期五播出的事實。你覺得叫……」她打了個響指。「我想到一個。《星期五夜燈》！」", "「我想那個名字有人用了。那是個關於德州高中美式足球隊的節目。」", "「喔，」她說。「嗯，我正好也在找新的節目可以看。」", "「那就延續週五主題吧。那…《當啞劇遇見週五》如何？」", "「那個有點生硬。」", "「名稱必須要精準地傳達這個系列到底是什麼，盡可能清楚。清楚是最重要的。大家應該知道它是全新的，但又完全一樣。等一下，我想到啦。」她揉著太陽穴。「我看到了。我們就叫它——」她把雙臂舉在頭上方張開，「《週五夜晚的午後啞劇》。」", "「週五晚上下午的默劇。這正是它。完美。謝謝。那些高層會愛死的。你說得對——換個新視角真的很重要。」", "已經十五年沒去過猶太教堂了。我以為贖罪日的禮拜會和我童年記憶中的儀式不同。但基本上還是一樣。冥想的。肅穆的。感傷的。感人的。無聊的。有趣的。又無聊。極度無聊。當羊角號被大力吹響時，人群發出壓抑的低語。一切如昔，甚至到那位詠唱者光禿禿的頭頂在唱卡迪什時鏡面般的反光都一樣。", "把你口袋裡的絨絮投進這條河。", "把你的文法警示交給這個實習生。"]}, {"type": "section", "title": "鐘的寓言", "paragraphs": ["我在酒吧按著一個呼叫鈴，那是我從箱子底下翻出來的一個鈴。威爾和我在一起，露西也在，她是那種會忠實遵守一條不成文法則的人：當我們需要任何與詩相關的建議時，不論如何都會出現。我正試著說服他們，在我母校朗讀我的筆記本時用這個鈴來標示段落間的空檔是個好主意。它聲音清脆響亮，實在可愛，雖然有點大聲。", "「你不覺得這有點——戲劇化嗎？」威爾說。", "「如果你就那樣，像是敲敲講台怎麼樣，」露西建議，敲了兩下桌子。「這或許是一個好方法。」", "「我喜歡鈴聲的聲音，」我說，固執地又響了一下以示強調。", "「露西說得對，」威爾說，這個叛徒。「我喜歡敲的主意。聽起來像是命運在敲門。」", "「鈴聲會讓人覺得你在求服務，」露西說。「你想要那樣嗎？」", "「也許我是吧，」我回嘴，為了強調敲響鈴，固執己見，迅速退回到幼稚的狀態。", "「聽著。那個鈴很蠢，」露西說，耐心耗盡。「那聲音就像戴軟呢帽一樣土。長大點。詩歌朗誦時不能拿道具。我們是想阻止你丟臉。」", "「那已經不是妳的事了，」我厲聲回應，重重把手拍在鈴上。吧台旁的一個女人沒有轉頭看我們，但說話讓我聽見。", "「每次那鈴一響，一個天使就他媽的失去翅膀。」", "最後我決定敲門。", "「你週末有什麼精彩的事嗎？」坐在我左邊的同事一邊打給我右邊的同事一邊說。辦公室的燈閃了閃。每個人杯裡的咖啡都冒著熱氣。我右邊的同事想了一會兒，將電話線繞在手指上。", "「我週末最精彩的是有時間，」她說。"]}], "ch17": [{"type": "chapter", "title": "十月", "paragraphs": ["一首關於數數的民謠。", "一首模仿警車警報聲的民謠。", "一首包含歌詞「I only love my bed and my mama, I’m sorry.」的民謠。", "一首包含歌詞「The only tune that the fiddle would play was ‘O, the Wind and the Rain.’ 」的民謠。"]}, {"type": "section", "title": "血脈的寓言", "paragraphs": ["我到俄亥俄鄉下去母校做詩歌朗誦。我沒帶那個鐘。朗誦反應良好。", "後來，我和榮恩吃晚飯，他是位深受喜愛的前宗教研究教授。榮恩是我所認識過最溫和的人之一，溫和近乎天才：好奇但從不咄咄逼人，彬彬有禮而是真誠的——中西部存在一種帶惡意的禮貌——深思但滑稽，嚴肅但開朗，閒聊但有重點。我在大學跟他修的一門課叫「死亡的意義」，是關於世界各宗教的死亡與哀悼儀式的概論，作業之一是為一位仍在世的人寫致悼詞。直到今天，我寫的每首詩裡都還留有這項作業的一點影子。", "Ron 現在已經退休了。他在鎮上有許多親近的朋友，但他從未結婚也沒有孩子。晚餐時他興高采烈地描述他的退休計畫——寫一部以神學院為背景的推理小說，故事取材自他年輕時親眼目睹的事件。", "我們的晚餐結束後互道再見，互相祝福。夜色在我過去常出沒的地方展開，我也許會在那裡受到啟發去寫一部推理小說，只要我能親眼見到一起謀殺案。但我又太老了，不能和那些學生打成一片，也太年輕，不能整晚和那些教授們在一起——他們反正都很早就上床睡覺。這是個美麗的秋夜，剩下的時間平安無事地過去。我睡得很差。", "我在黎明前醒來，趕搭回哥倫布機場的接駁車。天還黑時有一名年紀大概和 Ron 差不多的男子開著一輛轎車來到，並自我介紹說他叫 Don。", "我立刻不喜歡唐。他在車上跟我聊天，像個和善的獄卒。在這種情境下，談話是一種對親密關係的消毒噴霧——或者，如果你願意，純粹是形式。他不願冒險承受與陌生人沉默相處的精緻尷尬，這點我很珍惜，但他似乎也不願談任何對我們任何一方真正重要的事。", "他問我「做什麼工作」，當我告訴他我是詩人時，他又問我喜歡什麼運動。我問他「做什麼工作」——他說他是退休的數學老師。他曾在當地的高中教書，那是一所「有好名聲」的學校。我已經筋疲力盡，數著秒鐘等著可以下車。玉米田在黑暗中延展，像一道無盡的瘀傷。", "我愣住了。不是因為問題無禮，而是我驚訝他會走到這一步。我解釋說，他們不總是能從字面上理解我的詩——但他們尊重我讓生活圍繞詩歌轉動的選擇，即便這讓他們困惑。", "「只要能付得起帳，我想就行了，」唐說。我沒有提到直到最近我失業了八個月這件事。", "「你有小孩嗎？」我說。沉重的停頓，我意識到這正是他一直在試探的問題。然而他似乎又不太願意回答。", "「兩個女兒。差不多年紀和你一樣。」", "「她們做什麼的？」", "「年紀比較大的那個在伊利郡外的一家血庫工作了七年，但她離婚了，只好回來。她三十五歲。還在尋找男人。」他強調最後這句，好像無法理解，覺得這是他無法掌握的俚語。", "「我知道了。你能常看到她挺好的。」", "「是啊，她在這附近。」", "「那年紀比較小的呢？」", "一陣沉重的停頓。「她在 Rite Aid 上班。」", "「她喜歡那份工作嗎？」", "「他們對她很好。她有問題。發展遲緩。他們會配合她。」", "「喔，那太好了。能有份工作真好。」我開始非常厭惡自己。", "「她常跟一群沒什麼出息的人混在一起。」", "「你是什麼意思？」", "「別人看她反應慢，就會佔她便宜。」", "「那真是——太可怕了。我好難過。」我不知道該說什麼。", "「很痛。」", "我一時說不出話來。「她和她姊妹關係親近嗎？」", "「嗯，她們很親。」", "「那就好，」我不自覺地說。「她們還有彼此真好。」", "「嗯。好——不。其實那不完全是事實。他們常吵架。」", "「哦，所有兄弟姊妹都會吵。」", "「嗯，但他們吵的方式——不該再那樣吵了。他們已經是成年人了。」", "「我明白了。」", "太陽還沒升起，但玉米已開始有些發光，薄薄的苞葉像一道蒼白的波浪在我們前方蕩開。", "「事情已經到了我和我太太開始懷疑我們到底哪裡做錯的地步了。」", "我們兩人都直視前方的路，突然沉默地同時凝視。", "「你覺得你會有一天當爸爸嗎？」他過了一會兒說。", "「我曾經，呃──有養過貓，」我直接對著擋風玻璃說。「孩子我不確定。」", "「不一樣，」他搖頭說。「根本不一樣。」他深吸一口氣。然後他打開了體育新聞。", "「你覺得沒有 LeBron，騎士還能贏嗎？」我問，心中湧上一陣輕鬆，雖然我知道對唐來說這個問題等同於「你寫的是什麼樣的詩？」", "「不會。」他笑了。「不，我不這麼想。」他換了頻道。", "新聞。總統在某地說了什麼，然後有人在討論。", "我們正開到機場一半。雲朵開始泛起粉紅色。", "「我討厭政治，」他笑著說。", "在機場，凝望停機坪，我想：人就像磚頭。有時你是被丟進窗戶的磚頭，有時你是和牆窩在一起的那塊磚。", "「社會上的人太容易把書想成一種，去掉一面的一個立方體，作者好把他遇到的人『放進去』。」（Proust，Sodom and Gomorrah）", "作為一個社會上的人，我只抽過剛好足以讓我被這種文學立方體理論深深困擾的大麻。作者把人放進那個立方體時，那些人會怎麼樣？如果作者自己也爬進去和他們在一起呢？當立方體被關上後會發生什麼？", "就某事而哭。", "為某事而哭。", "X 在哭泣。"]}, {"type": "section", "title": "夢，10/24", "paragraphs": ["我正坐在一間昏暗、燭光搖曳的餐廳裡用餐。圍坐在桌旁的是我的家人。他們中有些非常年邁，披著披肩。是我的曾祖母們。他們彼此私下交談。", "這個夢感覺與以往不同——像是一則訊息。然後一名槍手走進匹茲堡的一座猶太教會堂，槍殺了十一個人。", "名字：它們不是照片。它們看起來不像你。", "名字：它們不是照片。然而，它們確實描繪了你。"]}, {"type": "section", "title": "玻璃的寓言", "paragraphs": ["在大廳靠近額外的安檢處掛起了一面美國國旗。我覺得這很令人困惑——那名槍手是一位白人至上主義者，據稱他的動機是一個陰謀論，認為白人基督徒美國人正被猶太人「取代」。在一間猶太機構的大廳掛起美國國旗今天感覺不對勁——就像在墮胎診所遭炸彈襲擊後，在候診室掛上十字架，或是在以色列向加沙的學校發射飛彈後，讓加沙的學生朗讀美國稅法。在我們的大廳裡，事實上——按照某種無聲押韻的邏輯——一面以色列國旗被掛在美國國旗旁邊。", "我在會議室等駐堂拉比。會面是在襲擊前就排定的——今天，會有不同的感受。他走進房間時，我起身迎接。他嚴肅地看著我，並用手揮了揮示意我坐下。", "「不用拘禮，」他說，這句虛假的話古老到該有自己的類型，更像神話而非謊言。我一見面就能識別出哪種有高階主管心態的人——這種人想要我起身跟他握手。而他又不想顯得自己想要那樣做。他年輕，幾乎和我同齡，但他聲音裡有某種東西——厚實、洪亮，帶著古老的菸草味——賦予他一種沉重感。「請坐，」他說。", "「你好嗎？」我說。", "「今天很難過。但並不意外。世上沒有什麼比仇視猶太人更古老的了。」", "「我早就知道自然歷史博物館的那隻暴龍是個反猶者。」這句話差點從我嘴裡抽搐而出。我換來的是一片冰冷的沉默。", "「對不起，」我說，「剛剛不太妥當。很不專業。我用幽默當作因應機制。」", "「聽著，D__。這是一個我們必須絕對團結的時刻。」", "我本來也同情團結這種概念，但他說的『我們』指的是誰並不清楚。是猶太人？是他和我？還是我們辦公室的生態系，我在那裡擔任入門級員工，而他在三十出頭就已經升上高層？我覺得自己像是誤闖進一間精神上的更衣室，鏡子都蒙了一層霧。", "「所以別擔心，」他說。", "我吐出一口氣。「我能為你做什麼？」", "「下個月，你應該知道，是十一月暴動（或稱水晶之夜）八十週年紀念。」", "「我們需要想一個好的紀念活動名稱。那將會是個肅穆的夜晚。但也會是個歡欣的夜晚，因為在這裡，我們都是倖存者。清楚是最重要的。大家應該要明白他們會得到什麼。但你是作家—你來告訴我。我想跟你提一個提案。你覺得怎麼樣——」他雙手在頭頂張開——「Kristallnacht 2018。」", "「呃，」我說。", "「2018 年的水晶之夜。很簡潔。清楚。你覺得怎麼樣？不錯吧？」", "「當然是由你決定。我只是覺得『2018 年的水晶之夜』這個語氣可能不太合適。」", "「有意思。」他皺起眉頭。「你為什麼這麼說？」", "「聽起來像是個非常可怕版本的科切拉（Coachella）。」", "「我明白了。」他沉思了一下。動作利落、順暢——看起來純屬肌肉記憶——他從西裝外套掏出一支 Juul 吸了幾口，那小小的指示燈亮了起來。他望向窗外，從嘴角吐出一小縷蒸氣。我沒有說話。瞬間，他的眼神轉回看向我，瞪大了眼睛，臉紅了起來。「喔，哎呀，」他說著，把 Juul 塞進口袋裡。「抱歉。我——正在努力戒掉。」", "「請不用擔心，完全沒關係，」我說。「就像你說的，現在是我們必須徹底團結的時候。」", "「話說回來，」他恢復鎮定地說。「那你會建議用什麼名字來稱呼那個計畫？」", "我把手合起來，望著天花板。「那像……喔，我不知道，『記住那個破碎玻璃之夜』怎麼樣？」", "他往椅背靠去，雙手交疊放在下巴下方。他的目光像鑽子一樣盯著我。", "「那很直接。很好，D__。我們可以用。謝謝你。」", "在布魯克林某個酒吧後院過萬聖節。空氣清涼而乾爽，氣氛歡愉，人們圍著噼啪作響的篝火，一邊喝著啤酒聊天，但我卻獨自飲酒。期中選舉像個閃亮的膿包聖誕節逼近。不久這家酒吧就會永久關門，在我坐著的地方會蓋起一棟惡臭的豪華高樓。但真正啃噬我的，並不是那些。", "除了有一個女人打扮成瓦爾多，穿著紅白條紋毛衣、戴著眼鏡和帽子外，沒有人穿著戲服。另一個人穿著南瓜燈套頭衫，但這不算數。", "事實上，看起來瓦爾多的男友也打扮成瓦爾多。", "但我在哪裡？", "入鄉隨俗，燒吧。"]}], "ch18": [{"type": "chapter", "title": "十一月", "paragraphs": ["好久沒寫詩了——自從我和露西分手後，我究竟有沒有寫過一首詩？這不一定是壞事。只有當你準備好了，詩才會來找你。但很難否認，最近在我的自我附近那片地帶——一個由神經元、腸道細菌和 THC 分子構成的格子，電訊號以半規律的間隔跳動，讓我吃、睡、擔心、發笑、見朋友，也或許寫詩——某些東西開始腐爛。我覺得自己像個退化的海綿狀物體，個性——而不是詩——有時像一種帶點硫磺味的黏稠膠狀物從宇宙水槽下方被抹起，電訊號危險地在其中嘶嘶作響。", "我一直在想上個月朗讀會後那個學生問的問題。如何寫出既真實又不過於私人化的詩？你必須在自我格子中保持平衡。如果不這麼做，你就只剩下一攤發臭的電性腐爛物：純粹的個性。", "治療師的診所位於上東城。角落裡有一台白噪音機嗡嗡作響。裝潢是老派但講究。地毯很厚。天花板的燈飾鑲滿了水晶。家具的木頭看起來比我家裡的還多。她準時開門，招呼我進去。", "「你為什麼來這裡，為什麼不告訴我？」她說。", "「我覺得被卡住了。」", "她盯著我看。", "忽然間對任何我能解讀為命令的話都順從起來，我把所有事都告訴了她：失去舊工作、失業、我和露西、和父母一起住在郊區、那次公路旅行、在亞利桑那有人對著我拔槍、還有新工作。某個時刻我發現自己因為喊叫而聲音沙啞。", "「所以這就是我來這裡的原因，」我說完。", "她點點頭。「我們的時間快到。下週我希望你試一件事。去買一本空白日記。在這本日記裡，我要你把每一次手淫時記得的所有細節都寫下來。」", "「什麼？」我說。", "「每一個細節。你用哪隻手？你在想什麼？燈光又是怎麼樣的？」", "「光的味道呢？」我說，引用艾什伯里的〈我還能在神聖的墓室居住多久〉，為自己感到得意。", "「光的味道呢？」她說，面無表情。", "我覺得解釋典故沒什麼意義。「可是，嗯，」我結巴地說，「如果我這週不自慰呢？」", "她一聲不響。", "「好吧，好吧，但——我已經有這本筆記本了。」我從包裡拿出來給她看。「我真的需要再買一本新的嗎？我想我忘了提——其實我是個詩人。」", "「筆記本不是日記，」她說。「而且這也不是詩。」", "我感到胸口湧起一陣奇怪的慌張。「我覺得這不會有好結果，」我說。", "「為什麼會這麼想？」", "「你不在我的保險網絡裡，」我撒謊。這人根本不可能了解我。", "「聽著，」她不以為意地說。「你？你不能這樣過一輩子。你會回來的。我很肯定。若非得如此，就想辦法弄到錢——或許你可以向你父母開口。與此同時，我想留給你一些重要的事好好思考。」", "我很惱怒。「是什麼？」", "「很難說出你內心的感受。」", "我等她繼續說下去，但她只是盯著我看。", "「我感受到的？還是一般人普遍感受到的？」", "她盯著我看。", "「那個，」我說，現在相當生氣， 「實在他媽的無聊。」", "「是，」她平靜地說，毫不猶豫。 「確實如此。」", "我的嘴張著。手發麻，耳朵轟響。我感到幾乎被劇烈地察覺，突然被真摯的感激淹沒。", "「謝謝你，」我說。", "她點點頭。", "「就像在一段自以為不熟悉、其實是從一個新的方向接近的鄉間路上，轉過一個彎，忽然發現自己走到了一條每一寸都很熟悉的路上，只是平常並不習慣從那個方向來，於是忽然對自己說：『啊，這就是通往 X 家朋友花園的小徑；我離他們家只有兩分鐘路，』然後，果然，他們的女兒就站在那裡出來向經過的人打招呼⋯⋯」（普魯斯特，The Captive）", "什麼樣的一天，經過幾天相似的重複，就能把身體不可逆地變成它幾乎是、卻又不完全是的樣子？"]}], "ch19": [{"type": "chapter", "title": "十二月", "paragraphs": ["「你感覺怎麼樣？」我在 FaceTime 上問露絲。", "「很好！」她說。「我的腳好痠。切斯特人超棒的。他在做晚餐，跟他打聲招呼。」", "她把手機轉向廚房裡一個高大、下顎方正、圍著圍裙的男人，他正攪拌著一大鍋。我已經好幾年沒見過切斯特，但他似乎一點都沒變老。", "「嗨，D__！」他邊揮著一把大湯匙邊說。我一直很喜歡他。我也揮手回應。", "「你看，」露絲把手機轉向她的肚子。「她在踢。」", "透過螢幕，一個形狀在露絲肚皮下方閃動滑過，像是古老湖泊中的生物。我真的既震驚又感動。", "「我的天哪，」我說。", "「你決定好要怎麼做了嗎？」她又把螢幕轉回她的臉。", "「關於什麼？」", "「約會。也許是時候了。」", "「你為什麼這麼說？」我問。她這種強烈建議的語氣不像她的作風。", "她猶豫了一下，聳了聳肩。「只是想了想而已。但如果你願意，我可以幫你在交友 App 上建立個人檔案。可能會很可愛。」", "我考慮了一下。「好啊，為什麼不呢。」", "「太好了。其實我已經幫你開始做了一份了。」", "「你——什麼？你做了？」", "「只是一個用來展示的小型 PowerPoint 簡報。我等會兒會讓你看我挑的圖片。現在，題目是『在空閒時間我喜歡……』下班回家你喜歡做什麼？」", "「抽大麻，然後聽格里高利聖歌。」", "「我們可以討論一下這個。接著看下一個。『我最近洗澡時想到的事是……』」", "「我光把陰莖染上黑死病會怎樣？」", "「你可別讓這變得簡單。」", "「抱歉，我可以只在我的陰莖上得鼠疫嗎？」", "「你真沒救。」", "「但那是真的！我前幾天洗澡時確實這麼想過！」", "我收到 Ruth 傳來的一些我的照片。", "他四肢攤在床上，像一袋雕塑般的指形小馬鈴薯。", "他的頭像一顆巨大的花生，臉上長了感染。有人告訴他，這種感染很英俊。", "幸運籤：WHEN IN ANGER, SING THE ALPHABET.", "「每一個人，即便是最卑微者，也掌控著那些熟悉的小生靈，它們既有生命又半倚靠在紙上，呈現一種恍惚的狀態：他獨有的筆跡字符。」（普魯斯特，《The Fugitive》）", "鬧鐘在七點三十分響起。聖誕節清晨。我把它關掉，閉上眼睛，看到一片黑色的舞動字母平面。我睜開眼再看鐘。顯示的是11:11。", "每一個字母表，都是一條固定的命令。每一秒，都是一場暫時的密謀。", "就這樣，時隔數月，一首詩忽然來到我腦中。"]}, {"type": "section", "title": "詩", "paragraphs": ["鐘能做一切。", "鐘可以在進入時死亡", "一口名為「債」的鐘exeunt命運，", "一口鐘吞噬露水消逝的特性，欣然", "一口鐘，徹底取消敘述的錯誤。", "鐘聲的合唱無法抽離情感，賦予天堂焚燒的乏味之吻", "一口鐘渴望；女兒們如元素般，堅硬如燧石的閒話，出於本能地憎恨", "鐘聲的頂點；在此搖曳努力的快速癱瘓網格", "鐘的生物領域，回響著友誼那幽靈般的仇恨整數", "鐘在計算。骯髒的差事，平板的魅力", "鐘暗暗地清洗，相當的特徵鍍金", "一聲鐘響，遠處緊急的哀鳴，為了", "一具鐘的殘骸首演，吞噬著", "一口鐘，拍打著昏暗的邊緣。", "我醒來，已是冬天。某個音符在我身體的中心偏離了音準。", "耳朵貼著某個他者的生命，把貧困譯為奢華會失去什麼？", "跨年夜早晨，在往公司通勤的火車上，有人吶喊：「大家都知道這種 FBI 的把戲已經完了——靠讓別人過得痛苦來維生的日子已經結束了。完了。」", "你聽到的，和我聽到的一樣嗎？"]}, {"type": "section", "title": "接觸的寓言", "paragraphs": ["我最喜歡的節日一直是跨年夜。這是我唯一覺得真正帶有宗教感的節日，因為它慶祝的是每個曾經在這個地方飄過的人—從一個蟲到另一個蟲—所共有的血統：時間。", "威爾、露西和我在一間酒吧碰面，我們玩一個心靈融合遊戲。規則：開始時，兩個人同時說一個隨機的字。接著當兩個人覺得他們已經發現代表原本兩個字精確中點的那個字時——例如「ocean」和「puddle」之間的中點可能是「lake」，或是「water」——他們就會說「contact」，並嘗試同時說出那個中點字。", "「三葉草，」威爾說。「起司，」露西說。", "「Contact！」我在酒吧的喧囂中大喊。「Contact，」威爾說。", "同時，Will 說「cow」，我說「graze」。", "「在 'cow' 和 'graze' 之間是什麼？」Will 醉醺醺地說。", "Lucy 和我互相看著對方。「Contact，」我們同時說。然後齊聲說：「Flies。」我們擊掌。", "「不錯，」Will 說。「怪怪的但不錯。下一輪。」", "「M. C. Escher，」露西說。「化學凝結尾跡，」我說。威爾突然看起來充滿電力。", "「接觸！」他大叫。「拉什·林博的乳頭！」", "露西幾乎要尿褲子，跑去洗手間。我笑得喘不過氣來。「什麼那麼好笑？」威爾喊道。「為什麼那麼好笑？」", "露西在午夜前一分鐘回來。「我很高興我們還是朋友，」我說。", "「我也是。」她微笑。「聽著，不過我得跟你說——我開始約會了。抱歉提這件事。我只是不要你從別人那裡知道。」", "原來這就是為什麼露絲一直堅持要我去用交友軟體。", "「當然。我為妳高興。」我這麼說的時候，才意識到這是真的。「我應該也會很快開始。」酒吧裡的人開始倒數。", "鐘聲敲響午夜，水晶球落下，場內響起《友誼地久天長》。露西把手搭在我的肩上。", "「新年快樂，」她說。「我很高興我們還在彼此的生活裡。」她停頓了一下。「而且我們的生活正在改變。」", "威爾大聲又跑調地唱著歌，抓住我的臉在我額頭上印了一個吻。我笑了，親了他一下臉頰。他朝我投來一個厭惡的眼神。「就這樣，你這小娘娘腔？你連點舌頭都不給我？」", "我們凌亂地熱吻。四周的酒吧裡，人群歡呼。", "在普魯斯特的《追憶似水年華》接近結尾處，讚嘆他那些冗長曲折的句子時，我並不覺得我多了解他，倒覺得他的文字彼此認識，親密地構成一個精緻的社會體系——主詞與受詞漫步於古老的花園小徑、穿過街道、在擁擠的客廳與空蕩的臥房中交換位置，路過時互相脫帽致意、鞠躬問候，繼續漫步，被時間的引力推向彼此，也推離彼此。", "但他偶爾會來一下，迅速打中要害。", "「所以我以為對我來說毫無意義的東西，其實只是我的整個人生。」（普魯斯特，The Fugitive）", "那就看你怎麼定義『整個』了。", "一種微弱但清晰的低語，像生意談判或遙遠的電視聲，從他們的嘴裡不斷地飄出。"]}], "ch20": [{"type": "chapter", "title": "一月", "paragraphs": ["與跨年夜相反，元旦感覺特別地、詭異地、令人沮喪地美國化。面對它的唯一方式就是去看電影。"]}, {"type": "section", "title": "北北西", "paragraphs": ["詩歌與香菸之間的界線", "就像電影畫格之間的那道界線", "或者嘴唇與文字之間的那條線", "總是彼此交錯的一方", "他逐行地前行", "藍線、白線、棕線、灰線", "一條披覆他舌頭的服裝線", "那套西裝掛在男人身上的線條", "一道攻擊線與一道逃逸線", "乘飛機或火車，荒野的線條", "你描繪出的逃逸速度以線條呈現", "如同建築界定了它所遮蔽的空間", "演員的身軀放射出線條", "華盛頓的石臉透過松樹凝視", "你在煙霧的線裡抽出的那一線", "你在點燃它的線上劃出的那一劃", "冬天不按順序綻放它的微笑。", "冬天把它的眼睛翻成一條條線。"]}, {"type": "section", "title": "宮廷之愛的寓言", "paragraphs": ["「我們今晚有幾道特色菜，」服務生說。「給素食者的，我有一份花椰菜嫩枝泥塔丁，沾上粉紅喜馬拉雅雨水的滋味，並以發酵蒲公英鬚蒼蠅吻過的蒜味蛋黃醬點綴。那會附上一份熱騰騰的豆子。給吃肉的人」——他朝我眨眼——「我有炸芭格乳牛奶裹粉的牛肉小球，油炸後淋上當地來源的白醬–Four Loko 醬，擺在一床凋萎的冰山萵苣上。最後，我強烈推薦我們的自傷鮭魚。今晚非常精緻。那將會被放入口中與章魚豬肉凍同嚼，並用一面插在焦糖化豬指上的微型花生醬與果醬三明治小旗半旗飄揚。」", "「我要那個植物泥，」我的約會對象說。", "我從未透過交友軟體與人見過面。約會對象的個人檔案寫著，她剛完成哥倫比亞物理博士課程的最後一學期，她最具爭議的觀點是全年都喝冰咖啡，她不是來自美國，希望未來的追求者猜猜她來自哪個國家——我猜是土耳其，但我不確定又不敢問——雖然她不抽菸，但偶爾會吸大麻。她的名字列為「P」。她聰明、可愛、還有點刻薄——完全是我的菜。我想我們會合得來。為了這個場合，我使出渾身解數。", "「你真正的名字是什麼？」我們並肩走向林肯中心，裹得嚴嚴實實抵禦刺骨寒風，我說。「不可能只是叫 P 吧。」", "「如果我喜歡你的話我會晚點告訴你。」她笑著說。「你是詩人？」", "「是的，」我說，邊走邊努力把背挺直。", "「真酷。我從沒看過現場詩人。既然你是詩人，跟我說說——你覺得什麼是恭敬之愛？」", "我猜她是指「宮廷式」。語言上有點障礙。", "「還有，」她小心地補充，「不是你認為的那種，而是——它到底是什麼？」", "「我不太確定我懂，」我說。「你是指，例如，游吟詩人的詩裡的東西？阿基坦的威廉？」", "她用鼻子大聲笑，指著我，捧著手到嘴邊大聲喊，讓人行道上的每個人都能聽見。「書呆子注意！」我決定我喜歡她。", "「你是物理學家？」我說。", "「是的。」", "「那太棒了。」我一時想不到可以補充的話。", "一個哭鬧的蹣跚學步兒被放在嬰兒車裡滾過，裹在厚重的運動休閒裹屍布裡，蜷縮著、踢踏著對抗寒冷。", "「你──呃──對小孩有什麼感覺？」我問，勇敢地從調情式、尷尬的小對話跳到完全不同的話題。我跟自己說今晚要直率。並不是我特別對孩子有興趣──只是覺得這是個直率的人會提出的話題。「你想要小孩嗎？」", "她挑了挑眉，但順著聊下去。「我喜歡小孩，但我不想擁有一個。」", "她從包包掏出一根菸點燃——奇怪的是，她在個人檔案裡說她不抽菸。人們會在這種地方對自己說謊嗎？她遞給我一根，我接過，讓自己有事可做，好把手忙一下幾分鐘。", "「妳經常去看芭蕾嗎？」我們在大衛·H·科赫劇院就座時，她這麼說。", "「不，其實——這是我第一次。不過據說巴蘭欽很棒。」", "「我看過他的新古典派作品，」她說。「只有一次。」", "燈光暗下，劇院一片寂靜。正好在這時，彷彿是行刑隊般，台下每一位年長的白人觀眾——佔了房間內的大多數——同時爆發出一陣又濕又劇烈、帶有結核病症狀的咳嗽浪潮。", "在Apollo裡，舞者們咔噠一聲合成為一個有機體，接著又同樣流暢地解散，回到他們放蕩不羈的人類隱私裡。他們的臉溶入四肢；身體在這裡基本上成了臉。一座巨大、嘲弄的、像轉馬般的喜悅墓碑。卡莉俄佩一邊踩踏著離去，彷彿朝兩個方向走去。史特拉汶斯基似乎同時跟隨她兩個方向。", "在Orpheus裡，地獄看起來相當有趣。有些舞者頭戴精緻的包包、肩膀上伸出陽具，有些則帶著昂貴而嚴苛的教育背景，但他們都清楚自己要往哪裡去。", "在俯瞰噴泉的陽台中場休息時，一名男子把拐杖從身軀旁伸出，手臂筆直。「我不需要這些！」他對站在數碼遠處的某人喊道。附近，三位義大利觀光客正在熱烈交談，說話並揮舞手勢，他們的呼吸在寒冷中像從盒子裡抽出的紙巾般浮起。", "「你覺得他們在討論解散他們每兩個月一次的狂歡，還是在形容一座異常美麗的燈塔？」我說。", "「兩種都會！」她笑著說。「我會說義大利語。」", "「你會說義大利語，但你是……土耳其人？」", "「是啊！」她大喊，一邊拍我的手臂，對我猜對了幾乎和我自己一樣驚訝。「猜得不錯。不過我的義大利語還蠻好的。」", "「他們到底在說什麼？」", "「法西斯主義。」", "鐘聲歡快地敲響，告訴我們該回到座位上。", "「我過得很愉快，」她說。燈光再次暗下時，她牽起我的手，放在她的大腿上。", "在Agon裡，我不留意發生了什麼。但不管是什麼，我都反對。", "隔天早上，我沒睡但心情極好，端著咖啡進她房裡。這幾年來，我一直懷疑自己是不是哪裡有問題。就在過去幾個小時裡，P.斬釘截鐵地暗示我一直想像的那種問題大概不是關鍵。", "「謝謝你，」她用指尖捏著熱杯說。她輕輕吻了我一下，我等著那吻變得緩慢而綿長——她會呼吸得很重，我很喜歡——但她轉開，喝了一口，眯起眼。「不過我想我還是要出去喝杯咖啡。我應該回家了。謝謝你今晚，還有早安。」她開始穿衣服。", "「今天真的很開心，」我說。「你想不想再一起出來，或許？」她看著我，眯起眼睛，就像她品咖啡時那樣。", "「真的很開心。」她停頓一下。「你有點冷嗎？」", "「哦，你冷嗎？抱歉，這棟樓的溫度真的很不穩定——」", "「不是的，」她說。「我的意思是，我覺得你還沒有準備好你以為自己想要的那些東西。你的心還沒有打開。我們最好不要產生依戀。但我很高興我們相遇了。」", "我愣住了。「我—你怎麼看得出來？我根本不是那麼覺得。」", "「你並不是你以為的那樣感覺。那是我知道我自己的感覺。」", "「我不知道。很遺憾聽到這件事。」", "我們沉默了一會兒。", "「你從來沒告訴我你的名字，」我說。", "她不理會這句話。「我並非有意不友善。」", "「不，不是那個。我只是——這不是你的錯。」我本能想就此打住——但或許現在該說出我的感受。我深吸一口氣。「這很丟臉，但我想我把太多責任壓在詩歌和愛情上，讓它們替我的人生賦予意義。對這兩樣來說壓力太大了。需要第三樣東西。」", "她點點頭。「我懂了。你有沒有考慮過金錢？」", "「我想那不會是那個。」", "「謎題呢？」她一邊穿上外套一邊說。「一個好的謎題可以很令人興奮。」她猶豫了一下。「我叫 Pinar。」", "我在她身後鎖上門，穿著內衣站著。", "你做的每一件事，都是一道傷口。", "在辦公室桌機上滑看新聞，我讀到一名巴勒斯坦母親和她十三歲的兒子在加薩邊界的持續抗議中，被以色列國防軍擊斃。近一年來，每個週五，巴勒斯坦示威者都聚集在鐵絲網旁，要求被允許返回如今屬於以色列的家園。那名母親中槍當場死亡；男孩被催淚瓦斯罐擊中頭部，數天後因傷重不治。", "我的臉先是麻木，接著發熱。我不禁想，如果有人對我母親做這種事，我會怎麼做？", "然後，從我螢幕的另一個區塊，我收到一封電子郵件通知，要求為一場宣傳世界知名「思想領袖」與企業大師最新著作的活動撰寫說明——這本「數據導向」的書探討了與陌生人交談在科學上證實的好處。", "我不禁想，當我的指關節緊抓咖啡杯把手直到發白時，這些數據讓你有什麼感受？", "我打給威爾。他沒接。我打給露絲。她沒接。我打給露西。她沒接。", "我決定打給我媽媽。", "「怎麼了？」她接起電話問。", "「沒事，」我撒謊道。「只是打電話來問候一下。」", "「噢。好——嗨！」", "「你今天過得怎麼樣？」", "「讓我想想。我今天跟一個老朋友吃午飯，是我以前一起共事的人——你知道的，說實在的，還蠻奇怪的。我們聊著聊著，突然他就隨口說——他最近才發現自己是個性成癮者！他開始去參加會議之類的。我簡直不敢相信。我的意思是，這很好，他在努力改變自己。無論如何，最扯的是在他決定要改變生活之後——我就不講那些血淋淋的細節了，但可以說他用了很多潤滑乳——他是因為開始讀一本叫做 Radical Honesty 的書才弄清楚這一切的。Radical Honesty！然後他從哪裡掏出這本書——天知道它去哪過——把書滑到桌上，跟我說他想把書送給我。你相信嗎？我說，『呃，不用了，親愛的——我可不想那麼誠實！』反正，他人還不錯——」", "「聽著，抱歉——其實，有事不對勁。」", "「我早就知道了，」她說，語氣像刀子一樣銳利。", "「我在新聞上讀到一個可怕的故事，讓我開始想——這是個糟透的問題。」", "「你可以問我任何事。」", "「如果我在抗議現場，被警察或士兵槍擊致死——你會怎麼做？」", "電話那頭，我聽到爸爸在洗碗。", "「你有麻煩了嗎？」她輕聲說。", "「不，並不是那樣。請別擔心。」", "「那對父母來說是最糟糕的一件事。」", "「我知道。抱歉讓你去想這個。但我想知道。你會怎麼做？」", "在背景中，我爸輕輕哼著〈Bridge over Troubled Water〉。", "「說實話？」她嘆氣。「我會做任何一個母親會做的事。我會設法去想像那個警察或士兵的母親。」她停頓。「或者我會追到天涯海角，用我的雙手把他殺了。」", "「我們的朋友之所以是朋友，只是在於一種伴隨我們一生、我們樂於適應的愉快愚行之光照下；但在我們心底，卻知道這不比那個因相信家具有生命而與之對話的人的妄想更合情理。」（Proust，Time Regained）", "我讀完了In Search of Lost Time。花了幾乎整整一年的時間。大約一年前我記得曾想過，這段時間或許會改變我。"]}], "ch21": [{"type": "chapter", "title": "二月", "paragraphs": ["嘴上抹著口紅的影子。", "一張沒有盡頭的臉。", "審視我提交的文案時，我的資深內容調整員說：「哦，我不知道，D__。你能再試一次嗎？這有點froid，你不覺得嗎？」", "會議室窗外，雪積在建築物上。", "寫一首詩和寫詩性之間有差別──詩總有結尾，但詩性會繼續下去。如果我太努力想寫出詩性，無意間就會寫成一首詩。或許在表演勞動與從事工作之間也有類似的分裂。", "我和公司全體員工一起排隊走進 Bret Stephens King 音樂廳參加多元化訓練。我們都坐定了。", "「謝謝大家來到這裡，」一位白人女子帶著耳機麥克風說。「這真是一個了不起的機構。我很期待我們一起來做這份工作。我想從一個總體性的問題開始。你們覺得什麼樣的社群在這個工作場所是受歡迎的？沒有錯的答案。不要害羞。」", "片刻沉默。「嗯，這當然是一個猶太機構，所以猶太人在這裡是受歡迎的，」有人說。「所有猶太人。」", "「太好了，」那位白人女子說。", "「任何與大屠殺倖存者有聯繫的人，」那位拉比說。", "「非常好，」那位白人女子說。「還有其他人嗎？」", "「我們在這裡為所有社群服務，」有人說。「從對珠寶製作課程有興趣的人到對水球有興趣的人，再到關心時事的人。從幼兒族群到長者。抱歉，我是說年滿六十五歲以上的個人。」", "「衣索比亞人！」有人喊道。", "沒有人說話。隨著幾秒鐘的流逝，它們似乎在膨脹又收縮，好像在呼吸。我轉過身，裝作伸展身體，朝音樂廳後方張望。坐在後排的主管們面無表情。但有些微妙的差異——他們各自以稍有不同的方式面無表情。有人靜靜地恍惚，或許有點滿意。有人嘴角微微下垂，看似準備就緒，平靜而自信地在那不眨眼的眼神後藏著對肢體暴力的準備。再細看，有個人微微皺起眉頭——她擔憂不安，臉朝向舞台但眼神低垂，彷彿在向手機祈禱。", "我環顧房間的其他人，才意識到我並不孤單——我們中有許多人悄悄地把身體扭向這最後一排。", "「太棒了！」白人女性說。「多元性培訓到此結束。明年見！」"]}], "ch22": [{"type": "chapter", "title": "三月", "paragraphs": ["二月總是提前結束，但三月則是純粹的延宕。"]}, {"type": "section", "title": "末句的寓言", "paragraphs": ["他就躺著，仰臥在過早綻放的三月苜蓿中，悠閒地讀著一首關於馬的詩。", "而那首關於馬的詩顯然越來越難捉摸——正如他愈發懷疑的，當他越接近末句時，該詩或許其實更在寫狗。", "「很糟，」她說。「非常糟。我幾乎走不了路。腦子也不清楚。全身都癢。唯一讓我好一點的就是坐在冰浴裡。這叫膽汁淤積。顯然我的肝臟把毒素漏進血管裡，所以我全身都癢但卻沒有皮疹。簡直是一場噩夢。」", "「天哪，」威爾說。", "「對不起，露絲，」露西說。「那聽起來太可怕了。」", "「他們要在四月初催生。要是把生個小孩搞成這樣，人類能活到現在真他媽是個奇蹟。這簡直是地獄。」", "「他們要催生？要不我們飛來洛杉磯待產怎麼樣？」露西說。", "「我可以去，」我說。「我還有休假天數。」", "「你們沒必要這麼做，」露絲說。", "「但我們想去，」威爾說。「去見嬰兒。也想在你身邊。」", "露絲的嘴唇開始發青。", "「你也得認識荷馬，」她說。", "在我在格子間閒逛、隨意瀏覽維基百科時讀到，土耳其語裡有一整套用於八卦的語法時態。每句話都以：「據說⋯⋯」開頭。", "一場在殘酷互相較勁中展開的公開辯論。", "一場在沈默中進行的座談會。", "一首在脊髓、肌肉、腺體與導管中演繹的詩。", "一場在公開場合上演的私人對話。", "「我在The New York Times上看到，一位叫 W. S. Merwin 的詩人上週過世了，」我媽在電話裡說。「你認識他嗎？」", "「Merwin 九十歲了。他住在夏威夷一個他創立的珍稀棕櫚保育區。我當然不認識他。」", "「你應該寄封電子郵件給他，」我爸說。「你們有很多共同點。你們都是詩人，都喜歡樹。而且他成就很高。太可惜了。其實挺令人難過的。」", "「說實話我從來沒有真正與 Merwin 的詩產生連結。我覺得大部分都挺無聊的。」", "「無聊？」我媽說。「這個 Merwin 寫了五十本書，據說！他救了很多珍貴樹木，還拿了兩座普立茲獎，你竟然說他無聊？」", "「聽著，我不是故意的──Merwin 就很無聊！有些詩還可以，但很多是在講拯救鯨魚和為白人寫的佛教！我倒是很喜歡The Lice。這樣你會比較開心嗎？」", "「你覺得 W. S. Merwin 無聊，突然間你就討厭鯨魚和佛教，卻又喜歡虱子？」", "「那是他書名之一。我唯一喜歡的。The Lice。」", "「多奇怪的書名，」我媽說。「你幹嘛總是喜歡奇怪的東西？」", "「各位，」我說，「Merwin 活了將近一個世紀，死在他喜愛樹木所環繞的那片人間淨土。就算我覺得他的詩無聊也無所謂。他過得很美好，不需要你們為他辯護。這場說教的重點是什麼？」", "「重點是，」我爸小心地說，「沒有努力那把力氣，他不可能死在那片漂亮的森林裡。」"]}], "ch23": [{"type": "chapter", "title": "四月", "paragraphs": ["我獨自一人替 Ruth 挑選嬰兒禮物，完全不知所措。會送嬰兒什麼呢？也許一頂小帽子？都會有動物耳朵：熊耳、狐狸耳、兔子耳。我選了狐狸耳。", "大家都知道嬰兒是從哪裡出來的。我們沒想過的是：嬰兒是要被放進哪裡？", "我試著透過口袋裡震動的頻率和節奏猜誰在傳簡訊給我。通常我都猜對。Ruth：一次震動。Lucy：也是一次，但不知怎的有旋律感。Will：連續五次。我媽：兩次。我爸：要嘛一次，要嘛七次——常常，不知怎的，既是一又是七。", "今晚只有一次震動。一張自拍，在產房，接著是", "hi from hell", "今晚的星星長什麼樣？我想露絲會想知道。我走到外面去看，但天陰著——一顆都看不見。", "幾個小時後我收到另一則簡訊。", "她到了", "隔天早上，我們飛往洛杉磯。"]}, {"type": "section", "title": "Exodus Rental Car 的寓言", "paragraphs": ["「我會幫你搞定的，」在 LAX 外面 Exodus Rental Car 櫃檯後的那位女士說。「別擔心。」我們的車子不在車場。我努力保持冷靜。", "「我們非得去你在網路上找到的最便宜租車行嗎？」露西低聲說。威爾氣得發燙。", "「別那樣嘛。這也是冒險的一部分。」", "「從什麼時候起，冒險變成人類所有經驗的基本單位了？」威爾說。", "櫃檯後的女人拿了我的駕照，將我的資訊輸入系統。然後她皺起眉頭抬頭看著我。「你是猶太人嗎？」", "我不喜歡事情會朝這個方向發展。我深吸一口氣，然後微笑。「是的，真的。」", "她燦笑。「我也是。那大概就是為什麼我要幫你牽線的原因。」", "她把一把日產 Versa 的車鑰匙丟給我。", "洛杉磯是天堂，或者也許只是天堂對我需要的一切。跟紐約不同的是，這裡偶爾會讓人感到被遺棄。像是一個完美外殼的完美外殼。當我們開進 Los Feliz 時，在高架橋上噴的塗鴉：", "讓美國再度歸於虛無"]}, {"type": "section", "title": "衝浪女孩的寓言", "paragraphs": ["當我們到達醫院時，露西和威爾直接上樓去露斯的病房。我在自助餐廳停下買了一杯咖啡。", "我看到切斯特獨自坐著，茫然卻幸福地發呆，被新手爸爸的內啡肽沖昏了頭。自研究所畢業後我就沒見過他本人。他站起來給了我一個熊抱。", "他揉揉眼睛，思索著。「有一分鐘一切都在這裡，」他說，握拳伸出手。「我所有的注意力都在露絲身上。然後嬰兒出來了——」他攤開手掌——「突然那個那裡也成了這裡。你會意識到——那個那裡可以去任何地方。」他把手一揮。「我想我需要更多咖啡。」", "在樓上的房間，露西把她交給我。不到一天大，她把頭靠在我的肩膀上，臉頰在她整個做夢的臉龐周圍微微塌陷。我不知道有多少時間那樣過去，也永遠不會知道。如果你碰她，她會泛起漣漪。", "我把她交給威爾。她對於被移動發出的那一聲輕啼是她唯一的反應。露絲坐在一袋冰上，露西在替她搓背。「各位，」露絲說，「我整個被震到了。」威爾把她交給切斯特。切斯特抱著這個小小的生命，然後又把她還給露絲。我們五個對著她唱《Surfer Girl》，她在睡夢中。", "我會從這裡看到你在那裡嗎？", "在我三十四歲生日那天清晨，我在天未亮前獨自前往聖塔莫尼卡山脈。我在曙光呈黯藍時踏上小徑，當山脊的顏色從褪色的青綠轉為紅色時抵達頂端。我的左側，在太平洋地平線上，當太陽從我身後照來，我隱約看見那行星曲線黯淡、帶水感的邊緣。轉向右邊，山間的陰影像樂譜般刮出線條，我才意識到自己正朝著去年夏天我開車來時的準確方向。", "那三百英里的躍動粉紅光芒是我從未走過的什麼？", "我見過最扭曲、最古老的貓一瘸一拐地走進房間。牠瘦骨嶙峋，看起來有點像被融化了。在牠眼睛應該在的地方，兩個光滑的毛窩夾在牠的小鼻子兩側。牠看起來像是直接從惡夢中被抽出來，又被吞嚥後再消化回夢境，就像貓會吃回自己的嘔吐物一樣。", "「牠的眼睛怎麼了？」露西面色蒼白地說。", "「牠沒有眼睛。牠生來就有退化性疾病。小時候獸醫把牠的眼窩縫起來以防感染。那就是為什麼我知道牠叫霍默。那位盲眼的詩人。是不是很可愛？」", "我們無人說話。", "晚餐後，我們圍著桌子談話。既然 Ashbery 已經去世了，我們開始討論，現在誰是最傑出的在世詩人？每個人可以提名兩位。", "「顯然是 Alice Notley。還有 Kim Hyesoon，」Will 說。", "「Claudia Rankine 還有—不，Claudia Rankine 太老生常談了。我要說 Robyn Schiff 和 Julian Talamantez Brolaski，」Lucy 說。", "「你剛剛選了三個！」我說。", "「我會直接進監獄。」", "「即使我現在不再寫詩了，我還能參加嗎？」切斯特一邊抱著嬰兒一邊說。", "「當然可以，老兄，」威爾說。「我們不是把關人。說來聽聽。」", "「拉烏爾·祖里塔跟露易絲·格魯克。」", "「真是奇怪的搭配，」威爾說。「那些選擇完全不合邏輯。」", "「好品味也可以不合邏輯，」露絲說，親了切斯特。", "「格呂克讓我起雞皮疙瘩，」我說。", "「我喜歡她的樸素，」切斯特自信地說。「一直都是。」", "「你喜歡祖里塔什麼？」", "「在紐約上空用天空字寫『MY GOD IS A WOUND』？」切斯特說。「我不知道，老兄。很硬派。」", "「葛呂克寫離婚和悲傷的花朵，」威爾說。「祖里塔寫被法西斯囚禁和折磨。」", "「皮諾切特政權結束了，但葛呂克至今仍被法西斯囚禁和折磨，」露絲說。「男性詩人。」", "「你們兩個是誰？」Chester 若無其事地問，轉向我。", "「Lisa Robertson 和 Nathaniel Mackey，」我說。我轉向 Ruth。", "「Jorie Graham 和 Ben Lerner，」Ruth 說。", "「Ben Lerner 不應該算，」我說。「他已經出賣自己了。基本上他現在是個小說家。」", "「你到底有什麼問題？」露西說。「小說只是一種形式，跟十四行詩或自由詩一樣。你喜歡 Ben Lerner 的小說嗎？」", "「喜歡，」我對著自己的腿說。「我很愛。」", "「懦夫，」威爾低聲罵道。", "「有很多偉大的在世詩人無可否認就是詩人，」我說。「Lyn Hejinian。Bernadette Mayer。」", "「如果你寫詩，你就是詩人，」露西說。「但索爾瑪茲·沙里夫大概是我們這年紀裡唯一不令人討厭的詩人了。」大家點頭。", "「除了在座各位，」露絲說。「你們都是我最喜歡的在世詩人。」", "「我們很討人厭，」露西說，「但我同意。」", "「我們的詩完全不同，」我說。「什麼把我們的詩派連在一起？」", "我們想了想這件事。", "「當詩人嗎？」威爾說。「我們都是非常理性的天才。」", "即使我行經否定之谷，我也不懼肯定之光。", "在機場，當我們正要搭紅眼班機回紐約時，我犯了查看工作郵件的錯誤。瀏覽著銷售報告和關於行政會議室旁堵住馬桶狀況的部門公告時，我打開了一封程式設計師的郵件，對方請我為一場由一位出身歐洲猶太裔、曾是美國著名政治人物所主講的演講撰寫活動說明。", "他的傳記廣為人知。為了逃離納粹政權而移民到美國後，他在學術界與美國政府有著輝煌的職業生涯，攀上華盛頓權力的頂峰，登上許多知名雜誌的封面，獲得諾貝爾和平獎，犯下令人驚訝的一長串戰爭罪行，導致數以百萬計的平民死亡，並以一種辛辣而詼諧的形象持續出現在數十年來的深夜電視節目中，他那天使般的臉龐在晚年漸漸下墜，沉入脖頸的深處。全世界普遍憎惡他因其政策所造成的流血與破壞，但在我的工作場所，這位戴著眼鏡的大屠殺者卻正被預定為一個名為「Children of Light」的年度捐贈講座系列的演講者，該系列邀請來自全球猶太僑民的知名人士。節目策劃人要求在五月初前提供一份活動說明。", "「老兄，我們就要登機了，」Will 說。「你手機怎麼了？」", "我坐在飛機的中間座位。右側靠走道的 Will 睡著了，嘴微張，眼睛用眼罩蓋著。左邊的 Lucy 因為一部關於兩個英國人在千元午餐上互相模仿名人的電影而笑到喘不過氣。我拍了拍她的手臂。她取下耳機。", "「我們在做什麼？」我說。", "「我們在做什麼？我正在看有史以來最棒的 Michael Cain
